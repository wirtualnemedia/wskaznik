/* MONTH GRID */
.months-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.month-card { background: var(--surface); border: 1px solid var(--border); padding: 28px; display: block; position: relative; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; overflow: hidden; cursor: pointer; }

.tweaks-panel { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-lg); padding: 20px; width: 240px; z-index: 200; display: none; }

          <div className="months-grid">

            {MONTHS.map((m, i) => (
              <React.Fragment key={m.id}>
                {i === 2 && (
                  <a className="month-card bonus" href="https://www.wirtualnemedia.pl/wskaznik/analiza.html">
                    <div className="month-label" style={{color:'var(--orange)'}}>Raport półroczny</div>
                    <div className="bonus-inner">
                      <div className="bonus-icon">★</div>
                      <div>
                        <div className="bonus-name">Bonus z analizą</div>
                        <div className="bonus-sub">Wrzesień 2025 – Luty 2026 · Meta-analiza 6 edycji</div>
                      </div>
                      <div style={{marginLeft:'auto'}}><span className="month-arrow">↗</span></div>
                    </div>
                  </a>
                )}
                <a className={`month-card${m.current?' current':''}`} href={m.href}>
                  <div className="month-label">Raport miesięczny</div>
                  <div className="month-name">{m.name}</div>
                  <div className="month-year">{m.year}</div>
                  <div className="month-divider"></div>
                  <div className="month-cta">
                    <span>Zobacz wyniki</span>
                    <span className="month-arrow">↗</span>
                  </div>
                </a>
              </React.Fragment>
            ))}
          </div>

          {/* Profile wydawców — sekcja-link */}
          <a className="month-card bonus" href="wydawcy.html" style={{marginTop:16, gridColumn:'1 / -1', borderColor:'var(--orange)'}}>
            <div className="month-label" style={{color:'var(--orange)'}}>Profile wydawców</div>
            <div className="bonus-inner">
              <div className="bonus-icon">⚐</div>
              <div>
                <div className="bonus-name">Indywidualne profile 130 marek</div>
                <div className="bonus-sub">Aktualna pozycja · historia 8 miesięcy · pozycje w kategoriach · najnowsze teksty</div>
              </div>
              <div style={{marginLeft:'auto'}}><span className="month-arrow">↗</span></div>
            </div>
          </a>
        </div>
      </section>

      {/* METHODOLOGY */}
      <section className="section">
        <div className="wrap">
          <h2 className="section-label">14 kategorii — wagi i źródła</h2>
          <div className="method-grid">
            {WEIGHTS.map(({name,w,src}) => (
              <div key={name} className="method-card">
                <div className="method-weight">{w}</div>
                <div className="method-name">{name}</div>
                <div className="method-src">{src}</div>
              </div>
            ))}
          </div>
          <p style={{marginTop:20, fontSize:13, color:'var(--text2)', lineHeight:1.7}}>
            Lider każdej kategorii otrzymuje <strong style={{color:'var(--text)'}}>100 punktów</strong>. Reszta jest przeliczana proporcjonalnie. Wyniki sumowane z uwzględnieniem wag i dzielone przez 14.
          </p>
        </div>
      </section>

      {/* Q&A */}
      <section className="section">
        <div className="wrap">
          <h2 className="section-label">O rankingu WWW</h2>
          <div>
            {[
              ['Czym jest Wirtualny Wskaźnik Wpływu (WWW)?','Autorski projekt serwisu Wirtualne Media, który mierzy skumulowaną cyfrową aktywność polskich wydawców. To swego rodzaju „power ranking" — nie bada pojedynczej metryki, lecz łączy <strong>14 kategorii danych</strong> w jeden syntetyczny wskaźnik. Analizowane jest wyłącznie to, co dzieje się w internecie.'],
              ['Jakie dane składają się na wynik WWW?','Wskaźnik bazuje na 14 kategoriach z odpowiednimi wagami: <strong>realni użytkownicy strony</strong> (waga ×2), odsłony strony (×1), średnia dzienna liczba RU (×1), średni czas na stronie (×1), cytowania (×1), odsłony YouTube (×1,5), interakcje na Facebooku (×1), odsłony wideo FB (×0,5), interakcje na Instagramie (×1), odsłony wideo IG (×0,5), interakcje na TikToku (×1), odsłony wideo TikTok (×0,5), interakcje na X/Twitterze (×0,5) i odsłony postów na X (×0,5).'],
              ['Jak jest wyliczany wynik końcowy?','Metodą benchmarku. W każdej kategorii lider (najwyższy wynik bezwzględny) otrzymuje <strong>100 punktów</strong>. Reszta jest przeliczana proporcjonalnie — np. połowa wyniku lidera = 50 pkt. Następnie wyniki wszystkich kategorii są sumowane z uwzględnieniem wag i dzielone przez liczbę kategorii (14), dając finalny wskaźnik WWW.'],
              ['Skąd pochodzą dane?','Z czterech źródeł: <strong>Mediapanel</strong> (dane o ruchu na stronach), <strong>Social Blade</strong> (YouTube), <strong>Sotrender</strong> (Facebook, Instagram, TikTok, X/Twitter — ok. 600 profili) oraz <strong>Mediaboard</strong> (cytowalność mediów).'],
              ['Ile marek jest analizowanych i jak często?','Ranking obejmuje ok. <strong>130 marek medialnych</strong> i ponad <strong>600 profili social media</strong>. Wyniki publikowane są <strong>co miesiąc</strong>. Jeśli medium ma kilka profili na danej platformie, ich wyniki się sumują — liczy się skumulowana aktywność marki.'],
            ].map(([q,a],i) => (
              <div key={i} className="qa-item">
                <div className="qa-q"><span className="qa-num">{i+1}</span>{q}</div>
                <div className="qa-a" dangerouslySetInnerHTML={{__html:a}}/>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer>
        <div className="wrap">
          <div className="footer">
            <div className="footer-brand">Wirtualny Wskaźnik Wpływu · Archiwum 2025–2026</div>
            <div className="footer-src">Źródło: Wirtualnemedia.pl · Kwiecień 2026</div>
          </div>
        </div>
      </footer>

      {/* TWEAKS */}
      <div className={`tweaks-panel${tweaksOpen?' visible':''}`}>
        <div className="tweaks-title">
          Tweaks
          <span className="tweaks-close" onClick={() => { setTweaksOpen(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }}>×</span>
        </div>
        <div className="tw-label">Motyw</div>
        <div className="tw-row">
          <div className={`tw-opt${!dark?' active':''}`} onClick={() => setDark(false)}>Jasny</div>
          <div className={`tw-opt${dark?' active':''}`} onClick={() => setDark(true)}>Ciemny</div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
