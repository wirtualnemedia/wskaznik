<meta charset=&quot;UTF-8&quot;>
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;>
<title>Quiz — Wirtualne Media</title>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.gstatic.com&quot; crossorigin>
<link rel=&quot;stylesheet&quot; href=&quot;https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&amp;display=swap&quot;>
<style>
/* ============ Tokens (Wirtualne Media) ============ */
:root {
  --navy:        rgb(7, 28, 45);
  --navy-2:      rgb(9, 44, 72);
  --brand-600:   rgb(11, 121, 190);
  --brand-700:   rgb(10, 96, 154);
  --brand-50:    rgb(241, 248, 254);
  --accent-600:  rgb(251, 95, 5);
  --accent-700:  rgb(201, 67, 5);
  --accent-50:   rgb(255, 247, 236);
  --accent-100:  rgb(255, 238, 211);
  --success-600: rgb(5, 150, 105);
  --success-700: rgb(4, 120, 87);
  --success-50:  rgb(236, 253, 245);
  --success-100: rgb(209, 250, 229);
  --danger-600:  rgb(220, 38, 38);
  --danger-50:   rgb(254, 242, 242);
  --danger-100:  rgb(254, 226, 226);
  --n-50:  rgb(242, 243, 247);
  --n-100: rgb(243, 244, 246);
  --n-200: rgb(229, 231, 235);
  --n-300: rgb(209, 213, 219);
  --n-400: rgb(156, 163, 175);
  --n-500: rgb(107, 114, 128);
  --n-600: rgb(75, 85, 99);
  --n-700: rgb(55, 65, 81);
  --n-800: rgb(31, 41, 55);
  --n-900: rgb(7, 28, 45);
  --white: #fff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-pill: 9999px;
  --shadow-lg: 0 12px 24px -6px rgba(16,24,40,.12), 0 4px 8px -4px rgba(16,24,40,.06);
  --ease: cubic-bezier(.4,0,.2,1);
  --font: &quot;DM Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif;
}


* { box-sizing: border-box; margin: 0; padding: 0; }


html, body {
  font-family: var(--font);
  color: var(--n-800);
  background: var(--n-50);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 24px 16px;
  min-height: 100vh;
}
/* When embedded in an iframe: wrap to content so the frame can self-size */
html[data-embedded] body { min-height: 0; padding: 0; background: transparent; }


/* ============ Shell ============ */
.quiz {
  width: 100%;
  max-width: 680px;
  background: var(--white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  position: relative;
}


/* Masthead */
.qhead {
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  gap: 16px;
}
.qhead .brand { display: flex; align-items: center; gap: 12px; }
.qhead img.logo { height: 40px; display: block; }
.qhead .tag {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent-600);
  white-space: nowrap;
}
.qhead .divider { width: 1px; height: 20px; background: rgba(255,255,255,.18); }
.qhead .tagline {
  font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,.55); white-space: nowrap;
}


/* Progress */
.qprogress { height: 4px; background: var(--n-200); position: relative; }
.qprogress .bar {
  position: absolute; inset: 0 auto 0 0; height: 100%;
  background: var(--accent-600); width: 0%;
  transition: width .4s var(--ease);
}


/* Body */
.qbody { padding: 32px 36px 36px; }


/* ============ Screens / animation ============ */
.screen { opacity: 1; animation: fade .35s var(--ease); }
@keyframes fade {
  from { transform: translateY(10px); }
  to   { transform: translateY(0); }
}


/* ============ Start screen ============ */
.kicker {
  font-size: 12px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; color: var(--brand-600);
}
.start .mark {
  width: 56px; height: auto; color: var(--accent-600); margin-bottom: 22px; display: block;
}
.start h1 {
  font-size: 34px; line-height: 1.12; font-weight: 600;
  letter-spacing: -1px; color: var(--n-900); margin: 12px 0 16px;
  text-wrap: balance;
}
.start p.lead {
  font-size: 16px; line-height: 26px; color: var(--n-600); max-width: 56ch;
}
.meta {
  display: flex; flex-wrap: wrap; gap: 10px 22px; margin: 26px 0 30px;
}
.meta .item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--n-700); }
.meta .item svg { width: 18px; height: 18px; stroke: var(--accent-600); }


/* ============ Buttons ============ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  font-family: var(--font); font-size: 16px; font-weight: 600; line-height: 1;
  border: none; border-radius: var(--radius-pill); cursor: pointer;
  padding: 15px 28px; transition: background .12s var(--ease), transform .12s var(--ease);
  white-space: nowrap;
}
.btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(251,95,5,.35); }
.btn-primary { background: var(--accent-600); color: #fff; }
.btn-primary:hover { background: var(--accent-700); }
.btn-primary:active { transform: translateY(1px); }
.btn-ghost { background: transparent; color: var(--n-700); padding: 15px 18px; }
.btn-ghost:hover { color: var(--n-900); background: var(--n-100); }
.btn-secondary { background: var(--n-800); color: #fff; }
.btn-secondary:hover { background: var(--n-900); }
.btn .arr { width: 18px; height: 18px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }


/* ============ Question screen ============ */
.qmeta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.qmeta .count { font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--brand-600); }
.qmeta .score {
  font-size: 12px; font-weight: 600; color: var(--n-500);
  display: flex; align-items: center; gap: 7px;
}
.qmeta .score b { color: var(--accent-600); }
.qtext {
  font-size: 23px; line-height: 31px; font-weight: 600; letter-spacing: -.4px;
  color: var(--n-900); margin-bottom: 24px; text-wrap: pretty;
}


.options { display: flex; flex-direction: column; gap: 12px; }
.opt {
  display: flex; align-items: center; gap: 16px; width: 100%; text-align: left;
  background: var(--white); border: 1.5px solid var(--n-200); border-radius: var(--radius-sm);
  padding: 16px 18px; cursor: pointer; font-family: var(--font);
  transition: border-color .12s var(--ease), background .12s var(--ease), box-shadow .12s var(--ease);
  position: relative;
}
.opt:hover:not(.locked) { border-color: var(--brand-600); background: var(--brand-50); }
.opt:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(251,95,5,.30); }
.opt .letter {
  flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: var(--n-600);
  background: var(--n-100); border: 1.5px solid var(--n-200);
  transition: all .12s var(--ease);
}
.opt:hover:not(.locked) .letter { border-color: var(--brand-600); color: var(--brand-700); }
.opt .label { font-size: 15.5px; line-height: 22px; font-weight: 500; color: var(--n-800); flex: 1; }
.opt .icon { flex: 0 0 auto; width: 22px; height: 22px; opacity: 0; transition: opacity .15s var(--ease); }


/* locked states */
.opt.locked { cursor: default; }
.opt.dim { opacity: .5; }
.opt.correct { border-color: var(--success-600); background: var(--success-50); }
.opt.correct .letter { background: var(--success-600); border-color: var(--success-600); color: #fff; }
.opt.correct .label { color: var(--success-700); font-weight: 600; }
.opt.correct .icon { opacity: 1; color: var(--success-600); }
.opt.wrong { border-color: var(--danger-600); background: var(--danger-50); }
.opt.wrong .letter { background: var(--danger-600); border-color: var(--danger-600); color: #fff; }
.opt.wrong .label { color: var(--danger-600); }
.opt.wrong .icon { opacity: 1; color: var(--danger-600); }


/* feedback row */
.feedback {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  margin-top: 24px; padding-top: 22px; border-top: 1px solid var(--n-100);
  animation: fade .3s var(--ease);
}
.feedback .verdict { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
.feedback .verdict.ok { color: var(--success-700); }
.feedback .verdict.no { color: var(--danger-600); }
.feedback .verdict svg { width: 22px; height: 22px; }


/* ============ Result screen ============ */
.result { text-align: center; }
.scorewrap { display: flex; flex-direction: column; align-items: center; margin: 6px 0 4px; }
.ring { position: relative; width: 168px; height: 168px; margin-bottom: 20px; }
.ring svg { transform: rotate(-90deg); }
.ring .center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.ring .num { font-size: 44px; font-weight: 600; letter-spacing: -1px; color: var(--n-900); line-height: 1; }
.ring .num span { font-size: 22px; color: var(--n-400); }
.ring .pct { font-size: 11px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; color: var(--accent-600); margin-top: 6px; }
.result h2 { font-size: 27px; font-weight: 600; letter-spacing: -.5px; color: var(--n-900); margin-bottom: 10px; }
.result p.sub { font-size: 16px; line-height: 25px; color: var(--n-600); max-width: 46ch; margin: 0 auto 28px; }
.result .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }


/* review */
.review { margin-top: 34px; text-align: left; border-top: 1px solid var(--n-100); padding-top: 26px; display: none; }
.review.open { display: block; }
.review h3 { font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--brand-600); margin-bottom: 18px; }
.rev-item { padding: 14px 0; border-bottom: 1px solid var(--n-100); }
.rev-item:last-child { border-bottom: none; }
.rev-q { font-size: 15px; font-weight: 600; color: var(--n-900); line-height: 22px; display: flex; gap: 10px; }
.rev-q .n { color: var(--n-400); flex: 0 0 auto; }
.rev-a { display: flex; align-items: flex-start; gap: 8px; margin: 8px 0 0 26px; font-size: 14px; line-height: 21px; }
.rev-a svg { width: 17px; height: 17px; flex: 0 0 auto; margin-top: 2px; }
.rev-a.correct-ans { color: var(--success-700); font-weight: 500; }
.rev-a.correct-ans svg { color: var(--success-600); }
.rev-a.your-wrong { color: var(--danger-600); }
.rev-a.your-wrong svg { color: var(--danger-600); }
.rev-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-pill); margin-left: 6px; vertical-align: middle; }
.rev-badge.ok { background: var(--success-100); color: var(--success-700); }
.rev-badge.no { background: var(--danger-100); color: var(--danger-600); }


/* footer note */
.qfoot { padding: 14px 24px; background: var(--n-50); border-top: 1px solid var(--n-100); text-align: center; }
.qfoot span { font-size: 11px; color: var(--n-400); letter-spacing: .3px; }
.qfoot b { color: var(--n-500); font-weight: 600; }


.hint { font-size: 12px; color: var(--n-400); margin-top: 14px; }


/* responsive */
@media (max-width: 560px) {
  body { padding: 0; align-items: stretch; }
  .quiz { border-radius: 0; box-shadow: none; min-height: 100vh; }
  .qbody { padding: 26px 22px 30px; }
  .start h1 { font-size: 28px; }
  .qtext { font-size: 20px; line-height: 28px; }
  .qhead .tagline { display: none; }
  .feedback { flex-direction: column; align-items: stretch; }

  function ico(name) {
    var p = {
      check: '<path d=&quot;M20 6L9 17l-5-5&quot;/>',
      x: '<path d=&quot;M18 6L6 18M6 6l12 12&quot;/>',
      arrow: '<path d=&quot;M5 12h14M13 6l6 6-6 6&quot;/>',
      reload: '<path d=&quot;M3 12a9 9 0 0 1 15.5-6.2M21 12a9 9 0 0 1-15.5 6.2&quot;/><path d=&quot;M17 4.5V8h-3.5M7 19.5V16h3.5&quot;/>',
      list: '<path d=&quot;M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01&quot;/>',
      clock: '<circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot;/><path d=&quot;M12 7v5l3 2&quot;/>',
      layers: '<path d=&quot;M12 3l9 5-9 5-9-5 9-5z&quot;/><path d=&quot;M3 13l9 5 9-5&quot;/>',
      target: '<circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot;/><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;1&quot;/>'
    };
    return '<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; ' +
           'stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;>' + p[name] + '</svg>';
  }


  function esc(s) {
    return String(s).replace(/[&amp;<>&quot;]/g, function (c) {
      return { &quot;&amp;&quot;: &quot;&amp;amp;&quot;, &quot;<&quot;: &quot;&amp;lt;&quot;, &quot;>&quot;: &quot;&amp;gt;&quot;, '&quot;': &quot;&amp;quot;&quot; }[c];
    });
  }


  /* ---------- progress ---------- */
  function setProgress() {
    var pct = 0;
    if (state.screen === &quot;question&quot;) pct = (state.index / total) * 100;
    else if (state.screen === &quot;result&quot;) pct = 100;
    barEl.style.width = pct + &quot;%&quot;;
  }


  /* ---------- render ---------- */
  function render() {
    setProgress();
    if (state.screen === &quot;start&quot;) renderStart();
    else if (state.screen === &quot;question&quot;) renderQuestion();
    else renderResult();
    postHeight();
  }


  function renderStart() {
    screenEl.innerHTML =
      '<div class=&quot;screen start&quot;>' +
        '<h1>' + esc(DATA.title) + '</h1>' +
        '<p class=&quot;lead&quot;>' + esc(DATA.intro) + '</p>' +
        '<div class=&quot;meta&quot;>' +
          '<div class=&quot;item&quot;>' + ico(&quot;list&quot;) + total + ' pytań</div>' +
          '<div class=&quot;item&quot;>' + ico(&quot;clock&quot;) + '3–5 min</div>' +
          '<div class=&quot;item&quot;>' + ico(&quot;target&quot;) + 'Jedna poprawna odpowiedź</div>' +
        '</div>' +
        '<button class=&quot;btn btn-primary&quot; id=&quot;startBtn&quot;>Rozpocznij quiz ' +
          '<span class=&quot;arr&quot;>' + ico(&quot;arrow&quot;) + '</span></button>' +
        '<p class=&quot;hint&quot;>Po każdym pytaniu od razu zobaczysz prawidłową odpowiedź.</p>' +
      '</div>';
    document.getElementById(&quot;startBtn&quot;).addEventListener(&quot;click&quot;, startQuiz);
  }


  function renderQuestion() {
    var qi = state.index;
    var q = DATA.questions[qi];
    var chosen = state.answers[qi];
    var locked = state.locked;
    var num = String(qi + 1).padStart(2, &quot;0&quot;);
    var tot = String(total).padStart(2, &quot;0&quot;);


    var opts = q.a.map(function (text, i) {
      var cls = &quot;opt&quot;;
      var iconHtml = '<span class=&quot;icon&quot;></span>';
      if (locked) {
        cls += &quot; locked&quot;;
        if (i === q.correct) { cls += &quot; correct&quot;; iconHtml = '<span class=&quot;icon&quot;>' + ico(&quot;check&quot;) + '</span>'; }
        else if (i === chosen) { cls += &quot; wrong&quot;; iconHtml = '<span class=&quot;icon&quot;>' + ico(&quot;x&quot;) + '</span>'; }
        else { cls += &quot; dim&quot;; }
      }
      return '<button class=&quot;' + cls + '&quot; data-i=&quot;' + i + '&quot;' + (locked ? ' disabled' : '') + '>' +
               '<span class=&quot;letter&quot;>' + LETTERS[i] + '</span>' +
               '<span class=&quot;label&quot;>' + esc(text) + '</span>' +
               iconHtml +
             '</button>';
    }).join(&quot;&quot;);


    var feedback = &quot;&quot;;
    if (locked) {
      var correct = chosen === q.correct;
      var last = qi === total - 1;
      var verdict = correct
        ? '<div class=&quot;verdict ok&quot;>' + ico(&quot;check&quot;) + 'Dobra odpowiedź!</div>'
        : '<div class=&quot;verdict no&quot;>' + ico(&quot;x&quot;) + 'Niepoprawnie — poprawna jest „' + esc(q.a[q.correct].replace(/^[„&quot;]|[&quot;”]$/g, &quot;&quot;)) + '”</div>';
      feedback =
        '<div class=&quot;feedback&quot;>' + verdict +
          '<button class=&quot;btn btn-primary&quot; id=&quot;nextBtn&quot;>' +
            (last ? 'Zobacz wynik' : 'Następne pytanie') +
            ' <span class=&quot;arr&quot;>' + ico(&quot;arrow&quot;) + '</span></button>' +
        '</div>';
    }


    screenEl.innerHTML =
      '<div class=&quot;screen&quot; data-screen-label=&quot;Pytanie ' + num + '&quot;>' +
        '<div class=&quot;qmeta&quot;>' +
          '<span class=&quot;count&quot;>Pytanie ' + num + ' / ' + tot + '</span>' +
          '<span class=&quot;score&quot;>Wynik <b>' + state.score + '</b></span>' +
        '</div>' +
        '<div class=&quot;qtext&quot;>' + esc(q.q) + '</div>' +
        '<div class=&quot;options&quot;>' + opts + '</div>' +
        feedback +
      '</div>';


    if (!locked) {
      [].forEach.call(screenEl.querySelectorAll(&quot;.opt&quot;), function (btn) {
        btn.addEventListener(&quot;click&quot;, function () { answer(parseInt(btn.dataset.i, 10)); });
      });
    } else {
      var nb = document.getElementById(&quot;nextBtn&quot;);
      if (nb) nb.addEventListener(&quot;click&quot;, next);
    }
  }


  function renderResult() {
    var pct = Math.round((state.score / total) * 100);
    var msg = resultMessage(pct);


    // ring geometry
    var r = 76, c = 2 * Math.PI * r, off = c * (1 - state.score / total);


    var reviewItems = DATA.questions.map(function (q, i) {
      var chosen = state.answers[i];
      var correct = chosen === q.correct;
      var yourLine = &quot;&quot;;
      if (!correct &amp;&amp; chosen != null &amp;&amp; chosen >= 0) {
        yourLine = '<div class=&quot;rev-a your-wrong&quot;>' + ico(&quot;x&quot;) +
          '<span>Twoja odpowiedź: ' + esc(q.a[chosen]) + '</span></div>';
      }
      var badge = correct
        ? '<span class=&quot;rev-badge ok&quot;>+1</span>'
        : '<span class=&quot;rev-badge no&quot;>0</span>';
      return '<div class=&quot;rev-item&quot;>' +
        '<div class=&quot;rev-q&quot;><span class=&quot;n&quot;>' + (i + 1) + '.</span>' +
          '<span>' + esc(q.q) + badge + '</span></div>' +
        '<div class=&quot;rev-a correct-ans&quot;>' + ico(&quot;check&quot;) +
          '<span>' + esc(q.a[q.correct]) + '</span></div>' +
        yourLine +
      '</div>';
    }).join(&quot;&quot;);


    screenEl.innerHTML =
      '<div class=&quot;screen result&quot;>' +
        '<div class=&quot;scorewrap&quot;>' +
          '<div class=&quot;ring&quot;>' +
            '<svg width=&quot;168&quot; height=&quot;168&quot; viewBox=&quot;0 0 168 168&quot;>' +
              '<circle cx=&quot;84&quot; cy=&quot;84&quot; r=&quot;' + r + '&quot; fill=&quot;none&quot; stroke=&quot;var(--n-200)&quot; stroke-width=&quot;12&quot;/>' +
              '<circle cx=&quot;84&quot; cy=&quot;84&quot; r=&quot;' + r + '&quot; fill=&quot;none&quot; stroke=&quot;' + msg.color + '&quot; stroke-width=&quot;12&quot; ' +
                'stroke-linecap=&quot;round&quot; stroke-dasharray=&quot;' + c + '&quot; stroke-dashoffset=&quot;' + off + '&quot; ' +
                'id=&quot;ringFill&quot;/>' +
            '</svg>' +
            '<div class=&quot;center&quot;>' +
              '<div class=&quot;num&quot;>' + state.score + '<span>/' + total + '</span></div>' +
              '<div class=&quot;pct&quot;>' + pct + '% poprawnych</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<h2>' + msg.title + '</h2>' +
        '<p class=&quot;sub&quot;>' + msg.text + '</p>' +
        '<div class=&quot;actions&quot;>' +
          '<button class=&quot;btn btn-secondary&quot; id=&quot;reviewBtn&quot;>' +
            '<span class=&quot;arr&quot;>' + ico(&quot;list&quot;) + '</span> Przejrzyj odpowiedzi</button>' +
          '<button class=&quot;btn btn-primary&quot; id=&quot;retryBtn&quot;>' +
            '<span class=&quot;arr&quot;>' + ico(&quot;reload&quot;) + '</span> Powtórz quiz</button>' +
        '</div>' +
        '<div class=&quot;review&quot; id=&quot;review&quot;><h3>Wszystkie pytania i poprawne odpowiedzi</h3>' + reviewItems + '</div>' +
      '</div>';


    // animate ring (enhancement only — resting markup is already filled,
    // so a throttled/hidden iframe still shows the correct value)
    var ring = document.getElementById(&quot;ringFill&quot;);
    if (document.visibilityState === &quot;visible&quot;) {
      ring.style.strokeDashoffset = c;
      requestAnimationFrame(function () {
        ring.style.transition = &quot;stroke-dashoffset 1s var(--ease) .15s&quot;;
        ring.style.strokeDashoffset = off;
      });
    }


    document.getElementById(&quot;retryBtn&quot;).addEventListener(&quot;click&quot;, reset);
    document.getElementById(&quot;reviewBtn&quot;).addEventListener(&quot;click&quot;, function () {
      var rv = document.getElementById(&quot;review&quot;);
      rv.classList.toggle(&quot;open&quot;);
      this.querySelector(&quot;.arr&quot;).nextSibling; // noop
      postHeight();
    });
  }


  function resultMessage(pct) {
    if (pct >= 90) return { title: &quot;Mistrz mediów!&quot;, color: &quot;var(--success-600)&quot;,
      text: &quot;Imponujący wynik — znasz historię polskich mediów lepiej niż niejeden redaktor.&quot; };
    if (pct >= 70) return { title: &quot;Świetna wiedza&quot;, color: &quot;var(--success-600)&quot;,
      text: &quot;Bardzo dobry rezultat. Kilka szczegółów wciąż może Cię zaskoczyć — sprawdź odpowiedzi.&quot; };
    if (pct >= 50) return { title: &quot;Niezły wynik&quot;, color: &quot;var(--accent-600)&quot;,
      text: &quot;Solidna podstawa. Przejrzyj poprawne odpowiedzi i popraw się przy kolejnym podejściu.&quot; };
    if (pct >= 30) return { title: &quot;Jest nad czym popracować&quot;, color: &quot;var(--accent-600)&quot;,
      text: &quot;Media kryją jeszcze przed Tobą sporo tajemnic. Zobacz prawidłowe odpowiedzi poniżej.&quot; };
    return { title: &quot;Czas nadrobić zaległości&quot;, color: &quot;var(--danger-600)&quot;,
      text: &quot;Nie szkodzi — przejrzyj poprawne odpowiedzi i spróbuj ponownie.&quot; };
  }


  /* ---------- actions ---------- */
  function startQuiz() {
    state.screen = &quot;question&quot;;
    state.index = 0;
    state.score = 0;
    state.answers = [];
    state.locked = false;
    render();
  }


  function answer(i) {
    if (state.locked) return;
    state.locked = true;
    state.answers[state.index] = i;
    if (i === DATA.questions[state.index].correct) state.score++;
    render();
  }


  function next() {
    if (state.index < total - 1) {
      state.index++;
      state.locked = false;
      render();
    } else {
      state.screen = &quot;result&quot;;
      render();
    }
  }


  function reset() {
    state.screen = &quot;start&quot;;
    render();
  }


  /* ---------- keyboard ---------- */
  document.addEventListener(&quot;keydown&quot;, function (e) {
    if (state.screen === &quot;question&quot;) {
      if (!state.locked &amp;&amp; /^[1-4]$/.test(e.key)) {
        var idx = parseInt(e.key, 10) - 1;
        if (idx < DATA.questions[state.index].a.length) answer(idx);
      } else if (state.locked &amp;&amp; (e.key === &quot;Enter&quot; || e.key === &quot; &quot;)) {
        e.preventDefault(); next();
      }
    } else if (state.screen === &quot;start&quot; &amp;&amp; (e.key === &quot;Enter&quot; || e.key === &quot; &quot;)) {
      e.preventDefault(); startQuiz();
    }
  });


  /* ---------- iframe auto-height ---------- */
  function applyHeight() {
    var quiz = document.querySelector(&quot;.quiz&quot;);
    var h = quiz ? Math.ceil(quiz.getBoundingClientRect().height) : document.documentElement.scrollHeight;
    // srcdoc / same-origin embeds: resize our own iframe directly (no host script needed)
    try { if (window.frameElement) { window.frameElement.style.height = h + &quot;px&quot;; } } catch (e) {}
    // cross-origin embeds: tell the parent page the height
    try { window.parent.postMessage({ type: &quot;wm-quiz-height&quot;, height: h }, &quot;*&quot;); } catch (e) {}
  }
  function postHeight() {
    applyHeight();               // immediate (layout is ready after render)
    setTimeout(applyHeight, 60); // fallback after paint/fonts (fires even when rAF is throttled)
  }
  window.addEventListener(&quot;resize&quot;, postHeight);
  window.addEventListener(&quot;load&quot;, postHeight);
  if (document.fonts &amp;&amp; document.fonts.ready) { document.fonts.ready.then(postHeight); }


  /* ---------- go ---------- */
  if (window.self !== window.top) {
    try { document.documentElement.setAttribute(&quot;data-embedded&quot;, &quot;&quot;); } catch (e) {}
  }
  render();
})();


</script>
</body>
</html>
"></iframe>
