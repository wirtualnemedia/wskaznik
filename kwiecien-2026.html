function LogoMark() {
  return (
    <svg width="36" height="24" viewBox="0 0 58 38" fill="none">
      <polygon points="0,2 8,2 13,36 5,36" fill="#F05A28" />
      <polygon points="10,36 18,36 28,3 20,3" fill="#F05A28" />
      <polygon points="30,3 38,3 43,36 35,36" fill="#F05A28" />
      <polygon points="40,36 48,36 58,2 50,2" fill="#F05A28" />
    </svg>);

}

function Ch({ v }) {
  if (v === 0) return <span className="ch eq">–</span>;
  return <span className={`ch ${v > 0 ? 'up' : 'dn'}`}>{v > 0 ? `+${v}` : v}</span>;
}

function RankTable({ data, cols }) {
  return (
    <div className="table-scroll">
      <table className="rank-table">
        <thead>
          <tr>
            <th>#</th>
            {cols.map((c, i) => <th key={i} className={i === cols.length - 1 ? '' : ''}>{c}</th>)}
          </tr>
        </thead>
        <tbody>
          {data.map((row, i) =>
          <tr key={i}>
              <td className="rk">{row[0]}</td>
              <td className="nm">{row[1]}</td>
              {cols.length === 3 && <td><Ch v={row[2]} /></td>}
              <td className="sc">{typeof row[row.length - 1] === 'number' ? row[row.length - 1].toFixed(2) : row[row.length - 1]}</td>
            </tr>
          )}
        </tbody>
      </table>
    </div>);

}

function MetricTable({ metric }) {
  const m = METRICS[metric];
  return (
    <div>
      <div className="table-scroll">
        <table className="rank-table">
          <thead>
            <tr>
              <th>#</th>
              <th>{metric}</th>
              <th style={{ textAlign: 'right' }}>Liczba</th>
              <th style={{ textAlign: 'right' }}>%</th>
            </tr>
          </thead>
          <tbody>
            {m.data.map(([name, val, pct], i) =>
            <tr key={i}>
                <td className="rk">{i + 1}</td>
                <td className="nm">{name}</td>
                <td className="sc">{val}</td>
                <td className="pct">{typeof pct === 'number' ? pct.toFixed(2) : pct}</td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
      <p className="data-src">Dane: {m.src}, kwiecień 2026</p>
    </div>);

}

function TabSet({ tabs, renderPanel }) {
  const [active, setActive] = React.useState(0);
  return (
    <div>
      <div className="tabs-nav">
        {tabs.map((t, i) =>
        <button key={i} className={`tab-btn${active === i ? ' active' : ''}`} onClick={() => setActive(i)}>{t}</button>
        )}
      </div>
      <div className="tab-panel active">{renderPanel(active)}</div>
    </div>);

}

                <div className="event-title">Nowa odsłona raportu WWW</div>
                <div className="event-desc">Wsłuchując się w głosy użytkowników, w tym miesiącu wprowadziliśmy zmiany w sposobie prezentacji wyników <strong>Wirtualnego Wskaźnika Wpływu</strong>. Odświeżony design ma sprawić, że analiza będzie bardziej czytelna, przejrzysta i wygodniejsza w odbiorze — zarówno na desktopie, jak i urządzeniach mobilnych.<br/><br/>Równolegle udało nam się znacząco przyspieszyć proces analizy danych i przygotowywania zestawień. Dzięki temu po raz kolejny publikujemy nie tylko główne TOP50, ale <strong>pełne zestawienie wszystkich analizowanych mediów</strong>.<br/><br/>Projekt pozostaje otwarty na kolejne marki i wydawców. Jeśli jest medium, które chciałoby znaleźć się w zestawieniu „WWW", prosimy o kontakt z redakcją Wirtualnemedia.pl.</div>

      <section className="section">
        <div className="wrap">
          <div className="section-label">Kluczowe wątki kwietnia</div>
          <div className="insights">
            {[
              { n: '01', t: 'WP wyprzedza Onet i obejmuje prowadzenie', b: 'Kwiecień przyniósł zmianę na szczycie: <strong>Wirtualna Polska wyprzedziła Onet</strong> i została liderem rankingu. Różnica między nimi nie jest ogromna, ale znacząca w porównaniu do poprzednich miesięcy.' },
              { n: '02', t: 'Onet mocny w odsłonach, ale to nie wystarczyło', b: 'Onet pozostaje najmocniejszy pod względem odsłon i dziennej liczby użytkowników na stronie, ale w kwietniu to nie wystarczyło do zwycięstwa w całym zestawieniu. WP zbudowała przewagę w innych obszarach: <strong>najwięcej użytkowników, najwięcej cytowań</strong> oraz bardzo mocne wyniki na Facebooku.' },
              { n: '03', t: 'Trzy wyraźne poziomy w czołówce', b: 'Czołówka rankingu układa się w trzy wyraźne poziomy. Na pierwszym są <strong>WP i Onet</strong>, które wyraźnie odskoczyły reszcie rynku. Niżej jest <strong>Interia</strong> — nadal bardzo mocna, ale z dużą stratą do pierwszej dwójki. Dopiero za nią zaczyna się kolejna grupa, w której bardzo blisko siebie znalazły się TVN24 i TVP.' },
              { n: '04', t: 'Kanał Zero — siła w socialach', b: 'Kanał Zero pozostaje jednym z najciekawszych przypadków w zestawieniu, bo jego siła jest przede wszystkim społecznościowa. W rankingu głównym zajmuje <strong>szóste miejsce</strong>, ale jednocześnie wygrywa na kilku platformach: <strong>YouTubie, Instagramie i X</strong>. To pokazuje, że marka zbudowana wokół wideo i social mediów może konkurować z dużo większymi wydawcami.' },
              { n: '05', t: 'TikTok: Polsat i Goniec dzielą się tronem', b: 'TikTok w kwietniu miał dwóch wyraźnych bohaterów: <strong>Polsat i Goniec</strong>. Polsat wygenerował najwięcej wyświetleń wideo, ale Goniec był mocniejszy w interakcjach. Jeden gracz miał większy zasięg oglądania, drugi silniej angażował użytkowników.' },
              { n: '06', t: 'Awanse poza ścisłą czołówką', b: 'Największe ruchy w rankingu wydarzyły się poza ścisłą czołówką. <strong>Biznes Info, Weszło i Viva</strong> mocno awansowały, natomiast najbardziej istotny z punktu widzenia większych graczy jest skok <strong>Radia Zet, które przesunęło się aż o 11 miejsc</strong> i weszło do TOP15.' },
              { n: '07', t: 'Elle — twarde lądowanie', b: 'Mocny spadek <strong>Elle</strong>, które w poprzednich miesiącach notowało spektakularne wyniki, a teraz znacząco spada i w kwietniu wylądowało dopiero na <strong>82. pozycji</strong>. Wcześniej wynik robiło bardzo mocnymi socialami. Niedawno straciło też redaktor naczelną, co być może też nie jest bez znaczenia.' },
              { n: '08', t: 'Kategorie tematyczne — niektóre już rozstrzygnięte', b: 'W kategoriach tematycznych widać, że część liderów ma już bardzo wyraźną przewagę. <strong>Nasze Miasto</strong> mocno prowadzi w lokalnych, <strong>TVP Sport</strong> w sporcie, a <strong>Filmweb</strong> w rozrywce. Dużo ciaśniej jest w technologii, gdzie <strong>Spider\u2019s Web</strong> tylko nieznacznie wyprzedza <strong>Gry Online</strong> — tam walka o pierwsze miejsce wygląda na bardziej otwartą.' },
              { n: '09', t: 'Waga ciężka na YouTube', b: 'Na uwagę zasługuje bardzo mocny wynik <strong>Polsatu na YouTube</strong>. Do tej pory o to miejsce walczyła przeważnie TV Republika i Wirtualna Polska. Polsat pokazał, że bardzo dobrze radzi sobie z rozprowadzaniem swoich treści i zanotował <strong>65 mln odsłon</strong>. Niekwestionowanym królem jest <strong>Kanał Zero</strong>, który po raz kolejny przekroczył <strong>100 mln odsłon</strong> — i to z dużym zapasem.' }].
            map(({ n, t, b }) =>
            <div key={n} className="insight-card">
                <div className="insight-num">{n}</div>
                <div className="insight-title">{t}</div>
                <div className="insight-body" dangerouslySetInnerHTML={{ __html: b }} />
              </div>
            )}
          </div>
        </div>
      </section>

      {/* CATEGORY LEADERS */}
      <section className="section">
        <div className="wrap">
          <div className="section-label">Liderzy kategorii tematycznych</div>
          <div className="cat-leaders">
            {CAT_LEADERS.map(({ cat, winner, score, change, color, pct }) =>
            <div key={cat} className="cat-row">
                <div className="cat-label">{cat}</div>
                <div className="cat-bar-wrap">
                  <div className="cat-bar-fill" style={{ width: `${pct}%`, background: color }}>
                    {winner} · {score}
                  </div>
                </div>
                <div className="cat-meta">
                  {change > 0 ? <span style={{ color: 'var(--green)' }}>▲ +{change}</span> : change < 0 ? <span style={{ color: 'var(--red)' }}>▼ {change}</span> : <span style={{ color: 'var(--text3)' }}>–</span>}
                </div>
              </div>
            )}
          </div>
        </div>
      </section>

      {/* MOVERS */}
      <section className="section">
        <div className="wrap">
          <div className="section-label">Istotne ruchy miesiąca</div>
          <div className="movers-grid">
            <div>
              <div className="movers-title up">▲ Awanse</div>
              {MOVERS_UP.map(({ d, n, c, p }) =>
              <div key={n} className="mover-row">
                  <div className="mover-delta up">{d}</div>
                  <div><div className="mover-name">{n}</div><div className="mover-cat">{c}</div></div>
                  <div className="mover-pos">{p}</div>
                </div>
              )}
            </div>
            <div>
              <div className="movers-title dn">▼ Spadki</div>
              {MOVERS_DN.map(({ d, n, c, p }) =>
              <div key={n} className="mover-row">
                  <div className="mover-delta dn">{d}</div>
                  <div><div className="mover-name">{n}</div><div className="mover-cat">{c}</div></div>
                  <div className="mover-pos">{p}</div>
                </div>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* FULL RANKINGS */}
      <section className="section" id="tabele">
        <div className="wrap">
          <div className="section-label">Pełne wyniki — Kwiecień 2026</div>
          <TabSet
            tabs={['TOP Ogólny', ...catTabs]}
            renderPanel={(i) => {
              if (i === 0) return <RankTable data={TOP} cols={['Wydawca', 'Zm.', 'WWW']} />;
              const key = catTabs[i - 1].toLowerCase().replace('é', 'e').replace('ó', 'o').replace(' ', '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
              const actualKey = Object.keys(CATS).find((k) => k === key || k === catTabs[i - 1].toLowerCase());
              const catData = CATS[actualKey || Object.keys(CATS)[i - 1]];
              return <RankTable data={catData.map((r, j) => [j + 1, ...r])} cols={['Wydawca', 'Zm.', 'WWW']} />;
            }} />
          
        </div>
      </section>

      {/* DETAILED METRICS */}
      <section className="section" id="szczegolowe">
        <div className="wrap">
          <div className="section-label">Wyniki szczegółowe — TOP 30 w kategoriach danych</div>
          <TabSet
            tabs={metricKeys}
            renderPanel={(i) => <MetricTable metric={metricKeys[i]} />} />
          
        </div>
      </section>

      {/* Q&A */}
      <section className="section">
        <div className="wrap">
          <div className="section-label">O rankingu WWW</div>
          <div className="qa-list">
            {[
            ['Czym jest Wirtualny Wskaźnik Wpływu (WWW)?', 'Autorski projekt serwisu Wirtualne Media, który mierzy skumulowaną cyfrową aktywność polskich wydawców. Łączy <strong>14 kategorii danych</strong> w jeden syntetyczny wskaźnik — analizowane jest wyłącznie to, co dzieje się w internecie.'],
            ['Jakie dane składają się na wynik?', '14 kategorii z wagami: <strong>realni użytkownicy (×2)</strong>, odsłony (×1), śr. dzienna RU (×1), czas na stronie (×1), cytowania (×1), YouTube (×1,5), FB interakcje (×1), FB wideo (×0,5), IG interakcje (×1), IG wideo (×0,5), TikTok interakcje (×1), TikTok wideo (×0,5), X interakcje (×0,5), X odsłony (×0,5).'],
            ['Jak jest wyliczany wynik końcowy?', 'Metodą benchmarku. Lider każdej kategorii = <strong>100 pkt</strong>. Reszta przeliczana proporcjonalnie. Wyniki sumowane z wagami i dzielone przez 14.'],
            ['Skąd pochodzą dane?', '<strong>Mediapanel</strong> (ruch na stronach), <strong>Social Blade</strong> (YouTube), <strong>Sotrender</strong> (FB, IG, TikTok, X — ok. 600 profili), <strong>Mediaboard</strong> (cytowania).'],
            ['Ile marek analizowanych i jak często?', 'Ok. <strong>130 marek medialnych</strong>, ponad <strong>600 profili social media</strong>. Wyniki publikowane <strong>co miesiąc</strong>. Profile danej marki na tej samej platformie są sumowane.']].
            map(([q, a], i) =>
            <div key={i} className="qa-item">
                <div className="qa-q"><span className="qa-num">{i + 1}</span>{q}</div>
                <div className="qa-a" dangerouslySetInnerHTML={{ __html: a }} />
              </div>
            )}
          </div>
          <div style={{ marginTop: 28, paddingTop: 20, borderTop: '1px solid var(--border)' }}>
            <div className="section-label" style={{ marginBottom: 10 }}>Lista analizowanych marek</div>
            <p className="brand-list">Android, Antyweb, Bankier, Benchmark, Bezprawnik, Biznes Info, Business Insider, Canal Plus Sport, Chip, Defence24, Dla Handlu, Do Rzeczy, Dobreprogramy, Donald, Dziennik Bałtycki, Dziennik Gazeta Prawna, Dziennik Zachodni, Dziennik Łódzki, Dziennik.pl, Elle Polska, Radio Eska, Eurosport Polska, Express Bydgoski, Express Ilustrowany, Fakt, Filmweb, Forbes, Forsal, Gazeta.pl, Gazeta Krakowska, Gazeta Pomorska, Gazeta Wrocławska, Gazeta Wyborcza, Glamour, Głos Koszaliński, Głos Szczeciński, Głos Wielkopolski, Gol24, Goniec, Gry Online, GSMmaniak, IT Hardware, Interia, Infor.pl, Jastrząb Post, Kanał Sportowy, Kanał Zero, Kobieta.pl, Komputer Świat, Kozaczek, Krytyka Polityczna, Lubimy Czytać, Medonet, Medycyna Praktyczna, Meczyki, Miejski Reporter, Money, Na Ekranie, naTemat, Nasze Miasto, National Geographic, newonce, Newsweek, Niebezpiecznik, Niezależna, Nowiny24, Nowości.com.pl, O2, Ofeminin, OKO.press, Onet, Pacjenci, Party, Plejada, Plotek, Polityka, Polki, Polsat, Polsat News, Polsat Sport, Polskie Radio, Polskie Radio24, Pomponik, Portal Samorządowy, PPE, Przegląd Sportowy, Pudelek, Puls Biznesu, Pyszności, Radio Zet, RMF FM, RMF24, Rzeczpospolita, Rynek Zdrowia, Smakosze, Spiders Web, Sport.pl, Super Express, Świat Gwiazd, Tabletowo, Telepolis, TOK FM, Transfery, Trójmiasto, TVN, TVN24, TVP, TVP Info, TVP Sport, TV Republika, Viva, Vogue Polska, Warszawa w Pigułce, Weszło, Wirtualnemedia, Wizaż, WNP, Wirtualna Polska, WP SportoweFakty, wPolityce, wPolsce24, Wprost, Wysokie Obcasy, Zwierciadło, XYZ.</p>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer>
        <div className="wrap">
          <div className="footer">
            <div className="footer-brand">Wirtualny Wskaźnik Wpływu · Kwiecień 2026</div>
            <div className="footer-src">Źródło: Wirtualnemedia.pl · Maj 2026</div>
          </div>
        </div>
      </footer>

      {/* TWEAKS */}
      <div className={`tweaks-panel${tweaksOpen ? ' visible' : ''}`}>
        <div className="tweaks-title">
          Tweaks
          <span className="tweaks-close" onClick={() => {setTweaksOpen(false);window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');}}>×</span>
        </div>
        <div className="tw-label">Motyw</div>
        <div className="tw-row">
          <div className={`tw-opt${!dark ? ' active' : ''}`} onClick={() => setDark(false)}>Jasny</div>
          <div className={`tw-opt${dark ? ' active' : ''}`} onClick={() => setDark(true)}>Ciemny</div>
        </div>
      </div>
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
