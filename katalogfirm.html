/* useFavorites — local-only saved companies (heart icon on cards) */
function useFavorites() {
  const [favs, setFavs] = React.useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('wm_katalog_favs')||'[]')); }
    catch { return new Set(); }
  });
  const toggle = id => {
    setFavs(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      try { localStorage.setItem('wm_katalog_favs', JSON.stringify([...n])); } catch {}
      return n;
    });
  };
  return { favs, toggle };
}

  const isPremium = company.premium || company.featured;
  const meta = companyMeta(company);

  return (
    <div
      onClick={onClick}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      className="card-hover"
      style={{
        position:'relative', background:'#fff', borderRadius:10, cursor:'pointer',
        padding:'16px 18px 14px',
        border: isPremium ? `1.5px solid ${T.orange}` : `1px solid ${T.gray200}`,
        boxShadow: hov ? '0 6px 20px rgba(0,0,0,0.08)' : '0 1px 2px rgba(0,0,0,0.04)',
        display:'flex', flexDirection:'column', gap:10,
      }}>

      {/* Top row: logo + name + cat */}
      <div style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
        <CompanyLogoPlaceholder name={company.name} size={48} bg={isPremium?'#FEF0E9':'#F4F4F5'}/>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:10, fontWeight:700, color:T.orange, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:3 }}>{company.cat}</div>
          <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
            <span style={{ fontSize:14.5, fontWeight:700, color:hov?T.orange:T.gray900, lineHeight:1.25, transition:'color 0.15s', textWrap:'pretty' }}>{company.name}</span>
            {meta.verified && <VerifiedIcon size={14}/>}
          </div>
        </div>
      </div>

      {/* Description */}
      <p className="line-clamp-2" style={{ fontSize:12.5, color:T.gray600, lineHeight:1.55, textWrap:'pretty', minHeight:38 }}>{company.short}</p>

      {/* Footer: city + premium pill */}
      <div style={{ display:'flex', alignItems:'center', gap:10, paddingTop:8, borderTop:`1px solid ${T.gray100}` }}>
        <span style={{ fontSize:11, color:T.gray500, display:'flex', alignItems:'center', gap:4 }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          {company.city}
        </span>
        <span style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:4 }}>
          {isPremium && (
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:'.05em', textTransform:'uppercase', color:'#fff', background:T.orange, padding:'3px 8px', borderRadius:9999, display:'flex', alignItems:'center', gap:3 }}>

              Wyróżniony
            </span>
          )}
        </span>
      </div>
    </div>
  );
}

/* ─── SEARCH BAR ─────────────────────────────────────────────────── */
function SearchBar({ value, onChange, onSearch }) {
  return (
    <div style={{ display:'flex',gap:8,maxWidth:640 }}>
      <div style={{ flex:1,position:'relative' }}>
        <svg style={{ position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:T.gray400,pointerEvents:'none' }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input value={value} onChange={e=>onChange(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&onSearch()}
          placeholder="Szukaj firmy, kategorii, usługi..."
          style={{ width:'100%',padding:'10px 12px 10px 38px',border:`1.5px solid ${T.gray300}`,borderRadius:6,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',color:T.gray900 }}
          onFocus={e=>e.target.style.borderColor=T.orange}
          onBlur={e=>e.target.style.borderColor=T.gray300}
        />
      </div>
      <button onClick={onSearch} style={{ background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'0 20px',fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer',whiteSpace:'nowrap' }}>
        Szukaj

  );
}

/* Generate plausible social URLs for a company (placeholder data). */
function companySocials(c) {
  const slug = c.www ? c.www.replace(/\.(pl|com|io|net|org|eu).*$/, '').replace(/[^\w]/g,'') : c.name.toLowerCase().replace(/[^\w]/g,'').slice(0,20);
  return [
    { kind:'linkedin', label:'LinkedIn', url:'https://linkedin.com/company/'+slug, color:'#0A66C2' },
    { kind:'facebook', label:'Facebook', url:'https://facebook.com/'+slug, color:'#1877F2' },
    { kind:'x', label:'X (Twitter)', url:'https://x.com/'+slug, color:'#000' },
    { kind:'instagram', label:'Instagram', url:'https://instagram.com/'+slug, color:'#E4405F' },
    { kind:'youtube', label:'YouTube', url:'https://youtube.com/@'+slug, color:'#FF0000' },
  ];
}

              <div style={{ background:'#fff', borderRadius:10, padding:'18px 20px', boxShadow:T.shadow1, border:`1px solid ${T.gray200}` }}>

                    <a key={s.kind} href={s.url} target="_blank" rel="noopener noreferrer"

                      onMouseEnter={e=>{e.currentTarget.style.borderColor=s.color; e.currentTarget.style.background=T.gray50;}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor=T.gray200; e.currentTarget.style.background='#fff';}}>
                      <div style={{ width:30, height:30, borderRadius:6, background:s.color, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                        <SocialIcon kind={s.kind} size={16} color="#fff"/>
                      </div>
                      <span style={{ fontSize:13, fontWeight:600, color:T.gray900, flex:1, minWidth:0 }}>{s.label}</span>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={T.gray400} strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                  ))}
                </div>
              </div>
            )}

            {/* "Twoja firma" CTA — non-premium */}
            {!isPremium && (
              <div style={{ background:T.navy, borderRadius:10, padding:'20px', color:'#fff', position:'relative', overflow:'hidden' }}>
                <div aria-hidden style={{ position:'absolute', top:-30, right:-30, width:120, height:120, borderRadius:'50%', background:'rgba(240,90,40,0.18)' }}/>
                <div style={{ position:'relative' }}>
                  <div style={{ fontSize:10.5, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', color:T.orange, marginBottom:8 }}>Twoja firma</div>
                  <div style={{ fontSize:16, fontWeight:800, color:'#fff', marginBottom:6, letterSpacing:'-0.01em' }}>Wyróżnij swój wpis</div>
                  <p style={{ fontSize:12.5, color:'rgba(255,255,255,0.65)', lineHeight:1.55, marginBottom:14 }}>Dodaj rozbudowany opis, galerię i kontakty. Zyskaj widoczność wśród czytelników WM.</p>

                    style={{ width:'100%', background:T.orange, color:'#fff', border:'none', borderRadius:9999, padding:'9px', fontSize:12.5, fontWeight:700, fontFamily:"'DM Sans',sans-serif", cursor:'pointer' }}>
                    Zobacz pakiety →
                  </button>
                </div>
              </div>
            )}
          </aside>
        </div>
      </div>

      {/* Responsive */}
      <style>{`
        @media (max-width: 980px) {
          .profile-grid { grid-template-columns: 1fr !important; }
          .profile-sidebar { position: static !important; }
        }
        @media (max-width: 640px) {
          .profile-wrap { padding: 18px 16px 0 !important; }
          .profile-header { padding: 18px !important; gap: 14px !important; flex-direction: column; align-items: flex-start !important; }
          .profile-header h1 { font-size: 22px !important; }
          .profile-add-btn { font-size: 11.5px !important; padding: 6px 12px !important; }
        }
      `}</style>
    </main>
  );
}

function PkgCompareCell({ val, highlight, accent }) {
  if (val === true) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ width:22, height:22, borderRadius:'50%', background:accent||T.orange, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
    );
  }
  if (val === false) {
    return <div style={{ textAlign:'center', color:T.gray300, fontSize:18, fontWeight:600, lineHeight:1 }}>—</div>;
  }
  return (
    <div style={{ textAlign:'center' }}>
      <span style={{ display:'inline-block', padding:'3px 9px', borderRadius:9999, background: highlight ? 'rgba(240,90,40,0.12)' : T.gray100, color: highlight ? T.orange : T.gray700, fontSize:11, fontWeight:700, whiteSpace:'nowrap' }}>{val}</span>

  );
}

  const [showCompare, setShowCompare] = React.useState(false);
  const compareRef = React.useRef(null);
  function toggleCompare() {
    const next = !showCompare;
    setShowCompare(next);
    if (next) {
      setTimeout(() => {
        const el = compareRef.current;
        if (el) {
          const y = el.getBoundingClientRect().top + window.scrollY - 90;
          window.scrollTo({ top:y, behavior:'smooth' });
        }
      }, 80);
    }
  }

  return (
    <main style={{ flex:1, padding:'0 0 48px' }}>
      <div style={{ maxWidth:1200, margin:'0 auto', padding:'24px 32px 0' }}>

        <div style={{ textAlign:'center', marginBottom:36 }}>
          <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:T.orange, marginBottom:8 }}>Pakiety ekspozycji</div>

          {PACKAGES.map(pkg => (
            <div key={pkg.id} style={{ display:'flex', flexDirection:'column' }}>

                {/* Badge */}
                <div style={{ display:'inline-block', fontSize:10, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', padding:'3px 8px', borderRadius:3, marginBottom:10, alignSelf:'flex-start', color:pkg.badgeColor, background:pkg.badgeBg }}>{pkg.badge}</div>

        </div>

        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 16px', background:'#FFF7F5', border:`1.5px solid rgba(240,90,40,0.25)`, borderRadius:6, marginBottom:8, fontSize:13, color:T.gray700 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.orange} strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

        {/* Compare packages — collapsible */}
        <div ref={compareRef}>
          <button
            onClick={toggleCompare}
            style={{
              width:'100%', padding:'14px 18px',
              background: showCompare ? T.gray50 : '#fff',
              border:`1.5px solid ${T.gray200}`,
              borderBottom: showCompare ? 'none' : `1.5px solid ${T.gray200}`,
              borderRadius: showCompare ? '8px 8px 0 0' : 8,
              fontFamily:"'DM Sans',sans-serif", fontSize:14, fontWeight:700,
              color:T.gray900, cursor:'pointer',
              display:'flex', alignItems:'center', justifyContent:'center', gap:10,
              transition:'all .15s',
            }}
            onMouseEnter={e => { if (!showCompare) { e.currentTarget.style.borderColor = T.navy; e.currentTarget.style.color = T.navy; } }}
            onMouseLeave={e => { if (!showCompare) { e.currentTarget.style.borderColor = T.gray200; e.currentTarget.style.color = T.gray900; } }}
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            Porównaj pakiety — pełne zestawienie świadczeń
            <span style={{ display:'inline-block', transition:'transform .2s', transform: showCompare ? 'rotate(180deg)' : 'rotate(0)' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
          </button>
          {showCompare && (
            <PkgComparePackages chosen={chosen} onSelect={setChosen} onClose={() => setShowCompare(false)}/>
          )}
        </div>
      </div>
    </main>
  );
}

/* ─── SHARED FORM HELPERS ────────────────────────────────────────── */
function Sect({ label }) {
  return <div style={{ fontSize:10, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', color:T.gray400, marginBottom:12, marginTop:4 }}>{label}</div>;
}

function Inp({ label, value, onChange, placeholder, required, type='text', locked=false, hint='' }) {
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:'block', fontSize:12, fontWeight:600, color:locked?T.gray400:T.gray700, marginBottom:5 }}>
        {label}{required && <span style={{ color:T.orange }}> *</span>}
        {locked && <span style={{ marginLeft:6, fontSize:10, background:T.gray200, color:T.gray500, padding:'1px 6px', borderRadius:3, fontWeight:600 }}>wyższy pakiet</span>}
      </label>
      <input type={type} disabled={locked} value={value||''} onChange={e=>onChange(e.target.value)}
        placeholder={locked ? 'Niedostępne w tym pakiecie' : placeholder}
        style={{ width:'100%', padding:'9px 12px', border:`1.5px solid ${locked?T.gray200:T.gray300}`, borderRadius:6, fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:'none', color:T.gray900, background:locked?T.gray50:'#fff' }}
        onFocus={e=>{ if(!locked) e.target.style.borderColor=T.orange; }}
        onBlur={e=>e.target.style.borderColor=locked?T.gray200:T.gray300}
      />
      {hint && <div style={{ fontSize:11, color:T.gray400, marginTop:3 }}>{hint}</div>}
    </div>
  );
}

                <Inp label="Imię i nazwisko" id="contactName" value={form.contactName} onChange={v=>set('contactName',v)} placeholder="np. Anna Kowalska" required/>
                <Inp label="Numer telefonu" id="contactPhone" value={form.contactPhone} onChange={v=>set('contactPhone',v)} placeholder="+48 000 000 000" required/>
                <div style={{ gridColumn:'1/-1' }}><Inp label="E-mail kontaktowy" id="contactEmail" value={form.contactEmail} onChange={v=>set('contactEmail',v)} placeholder="anna.kowalska@firma.pl" required type="email"/></div>
              </div>
              <p style={{ fontSize:11, color:T.gray400, marginTop:-4, lineHeight:1.5 }}>Dane służą wyłącznie do komunikacji z redakcją WM. Nie będą publikowane.</p>
            </div>
          </>)}

          {/* STEP 2 — Opis i media */}
          {step===2 && (<>
            <h2 style={{ fontSize:16, fontWeight:700, color:T.gray900, marginBottom:4 }}>Opis i media</h2>
            <p style={{ fontSize:13, color:T.gray500, marginBottom:20 }}>Opisz działalność firmy i prześlij materiały.</p>
            <Sect label="Logotyp"/>
            <div style={{ border:`2px dashed ${T.gray300}`, borderRadius:8, padding:'18px', textAlign:'center', cursor:'pointer', background:T.gray50, marginBottom:18 }}
              onClick={()=>document.getElementById('logo-upload').click()}>
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={T.gray400} strokeWidth="1.5" style={{ margin:'0 auto 6px', display:'block' }}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <div style={{ fontSize:13, fontWeight:600, color:T.gray600, marginBottom:2 }}>{form.logoName || 'Kliknij lub przeciągnij plik'}</div>
              <div style={{ fontSize:11, color:T.gray400 }}>PNG, SVG, JPG \u00b7 maks. 2 MB \u00b7 zalecane 400\u00d7400 px</div>
              <input id="logo-upload" type="file" accept=".png,.jpg,.jpeg,.svg" style={{ display:'none' }} onChange={e=>{ const f=e.target.files[0]; if(f) set('logoName',f.name); }}/>
            </div>
            <Sect label="Kategoria"/>
            <div style={{ marginBottom:14 }}>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:T.gray700, marginBottom:5 }}>Kategoria <span style={{ color:T.orange }}>*</span>{isStandard && <span style={{ fontSize:11, fontWeight:400, color:T.gray400, marginLeft:4 }}>(do {isPremium?5:3} kategorii)</span>}</label>
              <select value={form.cat} onChange={e=>set('cat',e.target.value)}
                style={{ width:'100%', padding:'9px 12px', border:`1.5px solid ${T.gray300}`, borderRadius:6, fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:'none', color:T.gray900, background:'#fff' }}>
                <option value="">-- Wybierz główną kategorię --</option>
                {CATS.slice(1).map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <Sect label="Opis firmy"/>
            <div style={{ marginBottom:14 }}>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:T.gray700, marginBottom:5 }}>Krótki opis <span style={{ color:T.orange }}>*</span> <span style={{ fontWeight:400, color:T.gray400 }}>(do {isPremium?800:isStandard?600:300} znaków)</span></label>
              <textarea rows={3} maxLength={isPremium?800:isStandard?600:300} value={form.short||''} onChange={e=>set('short',e.target.value)}
                placeholder="Krótki opis działalności firmy..."
                style={{ width:'100%', padding:'9px 12px', border:`1.5px solid ${T.gray300}`, borderRadius:6, fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:'none', color:T.gray900, resize:'vertical' }}/>
              <div style={{ fontSize:11, color:T.gray400, textAlign:'right', marginTop:3 }}>{(form.short||'').length}/{isPremium?800:isStandard?600:300}</div>
            </div>
            {isStandard && (
              <div style={{ marginBottom:14 }}>
                <label style={{ display:'block', fontSize:12, fontWeight:600, color:T.gray700, marginBottom:5 }}>Rozbudowany opis <span style={{ fontWeight:400, color:T.gray400 }}>(do {isPremium?5000:2000} znaków)</span></label>
                <textarea rows={5} maxLength={isPremium?5000:2000} value={form.longDesc||''} onChange={e=>set('longDesc',e.target.value)}
                  placeholder="Szczegółowy opis firmy, usług, doświadczenia, klientów..."
                  style={{ width:'100%', padding:'9px 12px', border:`1.5px solid ${T.gray300}`, borderRadius:6, fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:'none', color:T.gray900, resize:'vertical' }}/>
                <div style={{ fontSize:11, color:T.gray400, textAlign:'right', marginTop:3 }}>{(form.longDesc||'').length}/{isPremium?5000:2000}</div>
              </div>
            )}
            {isPremium && (<>
              <Sect label="Galeria zdjęć"/>
              <div style={{ border:`2px dashed ${T.gray300}`, borderRadius:8, padding:'16px', textAlign:'center', cursor:'pointer', background:T.gray50, marginBottom:14 }}>
                <div style={{ fontSize:13, fontWeight:600, color:T.gray600 }}>Dodaj zdjęcia (do 3 plików, maks. 5 MB każdy)</div>
                <div style={{ fontSize:11, color:T.gray400 }}>PNG lub JPG</div>
              </div>
              <Sect label="Wideo YouTube"/>
              <Inp label="Link do wideo" id="ytUrl" value={form.ytUrl} onChange={v=>set('ytUrl',v)} placeholder="https://www.youtube.com/watch?v=..." hint="Wideo będzie widoczne na profilu firmy jako odtwarzacz."/>
            </>)}
          </>)}

          {/* STEP 3 — Rozliczenie (tylko paid) */}
          {step===billingStep && isPaid && (<>
            <h2 style={{ fontSize:16, fontWeight:700, color:T.gray900, marginBottom:4 }}>Dane rozliczeniowe i podsumowanie</h2>
            <p style={{ fontSize:13, color:T.gray500, marginBottom:20 }}>Faktura VAT zostanie wystawiona po aktywacji wpisu.</p>

            {/* Podsumowanie zamówienia */}
            <div style={{ background:T.gray50, border:`1.5px solid ${T.gray200}`, borderRadius:8, padding:'18px 20px', marginBottom:24 }}>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:'.07em', textTransform:'uppercase', color:T.gray400, marginBottom:12 }}>Podsumowanie zamówienia</div>
              {[
                ['Pakiet', pkgData.name],
                ['Okres', '1 rok'],
                ['Cena netto', `${pkgData.price.toLocaleString('pl-PL')} zł`],
                ['VAT 23%', `${Math.round(pkgData.price*0.23).toLocaleString('pl-PL')} zł`],
              ].map(([k,v])=>(
                <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:T.gray600, marginBottom:7 }}>
                  <span>{k}</span><strong style={{ color:T.gray900 }}>{v}</strong>
                </div>
              ))}
              <div style={{ borderTop:`1px solid ${T.gray200}`, paddingTop:10, marginTop:6, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontWeight:700, fontSize:14 }}>Razem brutto</span>
                <span style={{ fontWeight:800, fontSize:22, color:T.orange }}>{Math.round(pkgData.price*1.23).toLocaleString('pl-PL')} zł</span>
              </div>
            </div>

            <Sect label="Dane do faktury"/>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 16px' }}>
              <div style={{ gridColumn:'1/-1' }}><Inp label="Nazwa firmy / imię i nazwisko" id="billingName" value={form.billingName} onChange={v=>set('billingName',v)} placeholder="Firma sp. z o.o." required/></div>
              <Inp label="NIP" id="billingNip" value={form.billingNip} onChange={v=>set('billingNip',v)} placeholder="0000000000" required/>
              <Inp label="E-mail do faktury" id="billingEmail" value={form.billingEmail} onChange={v=>set('billingEmail',v)} placeholder="faktury@firma.pl" required type="email"/>
              <div style={{ gridColumn:'1/-1' }}><Inp label="Adres" id="billingAddress" value={form.billingAddress} onChange={v=>set('billingAddress',v)} placeholder="ul. Przykładowa 1" required/></div>
              <Inp label="Kod pocztowy i miasto" id="billingCity" value={form.billingCity} onChange={v=>set('billingCity',v)} placeholder="00-000 Warszawa" required/>
              <Inp label="Telefon kontaktowy" id="billingPhone" value={form.billingPhone} onChange={v=>set('billingPhone',v)} placeholder="+48 000 000 000"/>
            </div>
            <div style={{ padding:'12px 14px', background:'rgba(240,90,40,0.06)', border:'1px solid rgba(240,90,40,0.2)', borderRadius:6, fontSize:12, color:T.gray700, lineHeight:1.6, marginTop:4 }}>
              Po złożeniu zgłoszenia nasz zespół skontaktuje się w ciągu 1 dnia roboczego w sprawie aktywacji i płatności.
            </div>
          </>)}

          {/* STEP — Potwierdzenie */}
          {step===confirmStep && (
            isPaid ? (
              <div style={{ textAlign:'center', padding:'20px 0' }}>
                <div style={{ width:72,height:72,borderRadius:'50%',background:'#DCFCE7',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px' }}>
                  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#22C55E" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h2 style={{ fontSize:20,fontWeight:800,color:T.gray900,marginBottom:8 }}>Zgłoszenie wysłane!</h2>
                <p style={{ fontSize:14,color:T.gray500,lineHeight:1.6,maxWidth:420,margin:'0 auto 16px' }}>
                  Twoja firma (pakiet {pkgData.name}) trafiła do weryfikacji. Skontaktujemy się na <strong style={{color:T.gray900}}>{form.contactEmail||form.billingEmail||'podany e-mail'}</strong> w ciągu 1 dnia roboczego.
                </p>
                <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:12,maxWidth:520,margin:'0 auto 20px',textAlign:'left' }}>
                  {[
                    {icon:'📋',label:'Status',val:'Oczekuje na weryfikację'},
                    {icon:'📦',label:'Pakiet',val:pkgData.name},
                    {icon:'💳',label:'Kwota',val:`${Math.round(pkgData.price*1.23).toLocaleString('pl-PL')} zł brutto`},
                    {icon:'⏱',label:'Czas aktywacji',val:'do 1 dnia roboczego'},
                  ].map(it=>(
                    <div key={it.label} style={{ padding:'14px',background:T.gray50,borderRadius:6,border:`1px solid ${T.gray200}` }}>
                      <div style={{ fontSize:20,marginBottom:4 }}>{it.icon}</div>
                      <div style={{ fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:T.gray400,marginBottom:2 }}>{it.label}</div>
                      <div style={{ fontSize:12,fontWeight:700,color:T.gray900 }}>{it.val}</div>
                    </div>
                  ))}
                </div>
                <div style={{ padding:'12px 18px',background:'rgba(240,90,40,0.06)',border:`1px solid rgba(240,90,40,0.2)`,borderRadius:8,maxWidth:420,margin:'0 auto 24px',fontSize:13,color:T.gray700,lineHeight:1.6 }}>
                  📧 Wysłaliśmy potwierdzenie na <strong>{form.contactEmail||form.billingEmail}</strong>. Sprawdź też folder SPAM.
                </div>
                <button onClick={()=>onNavigate('katalog')} style={{ background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'10px 28px',fontSize:14,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer' }}>Wróć do katalogu</button>
              </div>
            ) : (
              <div style={{ textAlign:'center', padding:'20px 0' }}>
                <div style={{ width:72,height:72,borderRadius:'50%',background:'#DCFCE7',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px' }}>
                  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#22C55E" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h2 style={{ fontSize:20,fontWeight:800,color:T.gray900,marginBottom:8 }}>Zgłoszenie wysłane!</h2>
                <p style={{ fontSize:14,color:T.gray500,lineHeight:1.6,maxWidth:400,margin:'0 auto 16px' }}>
                  Twoja firma trafiła do moderacji. Redakcja WM zweryfikuje wpis w ciągu 1–2 dni roboczych.
                </p>
                <div style={{ padding:'12px 18px',background:T.gray50,border:`1px solid ${T.gray200}`,borderRadius:6,maxWidth:380,margin:'0 auto 24px',fontSize:13,color:T.gray600 }}>
                  🔔 Powiadomimy Cię e-mailem gdy wpis będzie widoczny publicznie.
                </div>
                <button onClick={()=>onNavigate('katalog')} style={{ background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'10px 28px',fontSize:14,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer' }}>Wróć do katalogu</button>
              </div>
            )
          )}

          {step < confirmStep && (
            <div style={{ display:'flex', justifyContent:'space-between', marginTop:24, paddingTop:20, borderTop:`1px solid ${T.gray200}` }}>
              <button onClick={()=>step>1?setStep(s=>s-1):onNavigate('pakiety')}
                style={{ background:'#fff', color:T.gray600, border:`1.5px solid ${T.gray300}`, borderRadius:6, padding:'9px 20px', fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", cursor:'pointer' }}>
                {step===1?'← Wróć do pakietów':'Wstecz'}
              </button>
              <button onClick={()=>setStep(s=>s+1)}
                style={{ background:T.orange, color:'#fff', border:'none', borderRadius:6, padding:'9px 24px', fontSize:13, fontWeight:700, fontFamily:"'DM Sans',sans-serif", cursor:'pointer' }}>
                {step===confirmStep-1?'Wyślij zgłoszenie':'Dalej →'}
              </button>
            </div>
          )}
        </div>
      </div>
    </main>
  );
}
/* ─── FOOTER ─────────────────────────────────────────────────────── */
function Footer() {
  return (
    <footer style={{ background:T.navy,marginTop:0 }}>
      <div style={{ maxWidth:1200,margin:'0 auto',padding:'28px 32px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12 }}>
        <img src="../assets/logo-dark.png" alt="Wirtualne Media" style={{ height:24,objectFit:'contain' }}/>
        <span style={{ fontSize:11,color:'rgba(255,255,255,0.3)' }}>© 2026 Wirtualne Media. Wszelkie prawa zastrzeżone.</span>
      </div>
    </footer>
  );
}

/* ─── APP ────────────────────────────────────────────────────────── */
function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('wm_katalog')||'{}'); } catch { return {}; }})();
  const [page, setPage] = React.useState(saved.page||'katalog');
  const [pageData, setPageData] = React.useState(saved.pageData||null);

  function navigate(p, data) {
    setPage(p); setPageData(data||null);
    localStorage.setItem('wm_katalog', JSON.stringify({ page:p, pageData:data||null }));
    window.scrollTo(0,0);
  }

  return (
    <div style={{ display:'flex',flexDirection:'column',minHeight:'100vh' }}>
      <WmNav onNavigate={navigate} currentPage={page}/>
      {page==='katalog' && <KatalogHome onNavigate={navigate}/>}
      {page==='company' && <CompanyProfile company={pageData} onNavigate={navigate}/>}
      {page==='pakiety' && <PakietyPage onNavigate={navigate}/>}
      {page==='add' && <AddCompanyForm onNavigate={navigate} initPkg={pageData?.pkg}/>}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
