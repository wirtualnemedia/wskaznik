<head>

<title>Profil wydawcy — Wirtualny Wskaźnik Wpływu | Wirtualne Media</title>
<meta name="description" content="Profil wydawcy w rankingu WWW. Aktualna pozycja, historia 8 miesięcy, pozycje w kategoriach i najnowsze teksty.">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --bg: #F4F4F5; --surface: #ffffff; --surface2: #F9F9FA;
  --nav: #0D1B2A; --border: #E0E0E0; --border-strong: #CBD0D8;
  --orange: #F05A28; --orange-hover: #C94316; --orange-dim: rgba(240,90,40,0.10); --orange-dim2: rgba(240,90,40,0.06);
  --text: #111111; --text2: #555555; --text3: #8A9AAB;
  --green: #16A34A; --green-dim: rgba(22,163,74,0.12);
  --red: #DC2626; --red-dim: rgba(220,38,38,0.10);
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; line-height: 1.55; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button, input { font-family: inherit; cursor: pointer; }

/* NAV */
.nav-top { background: var(--nav); height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 14px; position: sticky; top: 0; z-index: 100; }
.nav-brand { display: flex; align-items: center; gap: 14px; margin-right: auto; }
.nav-brand-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.18); }
.nav-logo-wm { height: 22px; display: block; transition: opacity 0.15s; }
.nav-logo-www { height: 26px; display: block; transition: opacity 0.15s; }
.nav-brand a:hover .nav-logo-wm, .nav-brand a:hover .nav-logo-www { opacity: 0.78; }
.nav-link { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); padding: 8px 12px; border-radius: 4px; transition: all 0.15s; }
.nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-link.active { color: var(--orange); }

/* HERO */
.hero { background: var(--nav); color: #fff; padding: 36px 0 40px; position: relative; overflow: hidden; }
.hero-bg-name { position: absolute; right: -20px; bottom: -30px; font-family: 'Barlow Condensed', sans-serif; font-size: clamp(80px, 14vw, 220px); font-weight: 800; color: rgba(240,90,40,0.05); pointer-events: none; letter-spacing: -4px; line-height: 1; text-transform: uppercase; white-space: nowrap; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
.hero-breadcrumb { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
.hero-breadcrumb a { color: rgba(255,255,255,0.7); transition: color 0.15s; }
.hero-breadcrumb a:hover { color: var(--orange); }

.hero-grid { display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: end; padding-top: 12px; }
.hero-meta { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
.hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(48px, 8vw, 96px); font-weight: 800; line-height: 0.92; letter-spacing: -2px; margin-bottom: 12px; }
.hero-holding { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 18px; }
.hero-cat-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.hero-cat-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; }

.hero-stat { text-align: right; }
.hero-rank { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(60px, 10vw, 120px); font-weight: 800; color: var(--orange); line-height: 0.9; letter-spacing: -3px; }
.hero-rank-prefix { font-size: 0.4em; color: rgba(240,90,40,0.5); margin-right: 4px; vertical-align: super; }
.hero-rank-suffix { font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
.hero-score { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 700; color: #fff; margin-top: 12px; line-height: 1; }
.hero-score-lbl { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; margin-top: 2px; }
.hero-change { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; padding: 3px 10px; margin-top: 10px; }
.hero-change.up { background: var(--green-dim); color: var(--green); }
.hero-change.dn { background: var(--red-dim); color: var(--red); }
.hero-change.eq { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

/* KPI STRIP */
.kpi-strip { background: var(--surface); border-bottom: 1px solid var(--border); padding: 24px 0; }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
.kpi { padding: 0 24px; border-right: 1px solid var(--border); }
.kpi:last-child { border-right: none; }
.kpi:first-child { padding-left: 0; }
.kpi-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.kpi-val { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; color: var(--text); line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--text2); margin-top: 4px; font-weight: 500; }
.kpi-val .small { font-size: 0.55em; color: var(--text3); margin-left: 4px; font-weight: 600; }

/* SECTIONS */
.section { padding: 48px 0; border-bottom: 1px solid var(--border); }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.section-label::before { content: ''; width: 20px; height: 2px; background: var(--orange); display: inline-block; flex-shrink: 0; }
.section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 16px; letter-spacing: -0.5px; }

/* SUMMARY PARAGRAPH */
.summary-box { background: var(--surface); padding: 28px 32px; border-left: 3px solid var(--orange); }
.summary-text { font-size: 17px; line-height: 1.7; color: var(--text); font-weight: 400; }
.summary-text strong { font-weight: 700; color: var(--text); }
.summary-text .accent { color: var(--orange); font-weight: 700; }
.summary-text .up { color: var(--green); font-weight: 700; }
.summary-text .dn { color: var(--red); font-weight: 700; }

/* HISTORY CHART */
.chart-wrap { background: var(--surface); padding: 28px 32px; border: 1px solid var(--border); }
.chart-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
.chart-legend { display: flex; gap: 16px; font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: 0.04em; }
.chart-legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.chart-svg { width: 100%; height: 260px; }
.chart-tooltip { position: fixed; background: var(--nav); color: #fff; padding: 8px 12px; font-size: 12px; pointer-events: none; z-index: 100; box-shadow: var(--shadow-lg); }
.chart-tooltip-title { font-weight: 700; margin-bottom: 4px; font-size: 11px; color: var(--orange); letter-spacing: 0.06em; text-transform: uppercase; }

/* CATEGORIES */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.cat-card { background: var(--surface); border: 1px solid var(--border); padding: 18px 20px; position: relative; overflow: hidden; }
.cat-card-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--orange); }
.cat-card-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.cat-card-name { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
.cat-card-rank { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--orange); line-height: 1; }
.cat-card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.cat-card-trend { display: flex; gap: 4px; margin-top: 12px; align-items: center; font-size: 11px; color: var(--text3); }

/* RECENT ARTICLES */
.articles-wrap { background: var(--surface); border: 1px solid var(--border); padding: 28px 32px; }
.articles-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
.articles-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.articles-link { font-size: 12px; font-weight: 700; color: var(--orange); letter-spacing: 0.04em; text-transform: uppercase; display: inline-flex; gap: 6px; align-items: center; transition: gap 0.15s; }
.articles-link:hover { gap: 10px; }
.articles-placeholder { padding: 32px 24px; text-align: center; background: var(--surface2); border: 1px dashed var(--border-strong); }
.articles-placeholder-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
.articles-placeholder strong { color: var(--text); font-weight: 700; }
.articles-list { display: flex; flex-direction: column; gap: 0; }
.article-item { padding: 14px 0; border-top: 1px solid var(--border); display: flex; gap: 14px; align-items: flex-start; }
.article-item:first-child { border-top: none; padding-top: 0; }
.article-item-thumb { width: 80px; height: 60px; background: var(--surface2); flex-shrink: 0; object-fit: cover; }
.article-item-body { flex: 1; min-width: 0; }
.article-item-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 4px; transition: color 0.15s; }
.article-item:hover .article-item-title { color: var(--orange); }
.article-item-excerpt { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 6px; }
.article-item-meta { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }

/* ACTIONS / NAV BETWEEN PUBS */
.nav-pubs { display: flex; gap: 16px; justify-content: space-between; align-items: stretch; padding: 28px 0; flex-wrap: wrap; }
.nav-pub-card { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); padding: 16px 20px; transition: all 0.15s; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
.nav-pub-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: var(--shadow); }
.nav-pub-card-dir { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--orange); }
.nav-pub-card-name { font-size: 16px; font-weight: 700; color: var(--text); }
.nav-pub-card-rank { font-size: 12px; color: var(--text2); }

/* NOT FOUND */
.not-found { padding: 80px 24px; text-align: center; }
.not-found-title { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; color: var(--text); margin-bottom: 12px; letter-spacing: -1px; }
.not-found-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; max-width: 460px; margin-left: auto; margin-right: auto; }
.btn-primary { display: inline-block; padding: 10px 24px; background: var(--orange); color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 9999px; transition: background 0.15s; }
.btn-primary:hover { background: var(--orange-hover); }

/* FOOTER */
.footer { padding: 32px 0 48px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.footer-brand { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
.footer-src { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }

@media (max-width: 700px) {
  .nav-top { padding: 0 12px; gap: 8px; }
  .nav-link { padding: 6px 8px; font-size: 11px; }
  .wrap { padding: 0 14px; }
  .hero-grid { grid-template-columns: 1fr; gap: 24px; }
  .hero-stat { text-align: left; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 24px 0; }
  .kpi { border-right: none; padding: 0 16px; }
  .kpi:nth-child(odd) { border-right: 1px solid var(--border); padding-left: 0; }
  .summary-box { padding: 20px 22px; }
  .summary-text { font-size: 15px; }
  .chart-wrap { padding: 20px 16px; }
  .articles-wrap { padding: 20px 16px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="data-publishers.js"></script>
<script type="text/babel" src="wydawca-paragraph.js"></script>
<script type="text/babel" src="wydawca-chart.js"></script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

function LogoMark() {
  return (
    <svg width="32" height="22" viewBox="0 0 58 38" fill="none">
      <polygon points="0,2 8,2 13,36 5,36" fill="#F05A28"/>
      <polygon points="10,36 18,36 28,3 20,3" fill="#F05A28"/>
      <polygon points="30,3 38,3 43,36 35,36" fill="#F05A28"/>
      <polygon points="40,36 48,36 58,2 50,2" fill="#F05A28"/>
    </svg>
  );
}

function getQuery(name) {
  const u = new URLSearchParams(window.location.search);
  return u.get(name);
}

// Helpers
function getHistoryEntries(p, months) {
  return months.map(m => ({ month: m, entry: p.history[m.id] })).filter(x => x.entry);
}
function getLatest(p, months) {
  for (let i = months.length - 1; i >= 0; i--) {
    if (p.history[months[i].id]) return { ...p.history[months[i].id], month: months[i] };
  }
  return null;
}

function NotFound({ slug }) {
  return (
    <>
      <nav className="nav-top">
        <div className="nav-brand">
          <a href="https://www.wirtualnemedia.pl" target="_blank" rel="noopener" aria-label="Wirtualnemedia.pl">
            <img className="nav-logo-wm" src="assets/logo-wirtualnemedia.png" alt="Wirtualnemedia.pl"/>
          </a>
          <div className="nav-brand-divider"/>
          <a href="index.html" aria-label="Wirtualny Wskaźnik Wpływu">
            <img className="nav-logo-www" src="assets/logo-www.png" alt="Wirtualny Wskaźnik Wpływu"/>
          </a>
        </div>
        <a className="nav-link" href="index.html">Archiwum</a>
        <a className="nav-link" href="wydawcy.html">Profile wydawców</a>
      </nav>
      <div className="not-found">
        <div className="not-found-title">Nie znaleziono wydawcy</div>
        <div className="not-found-sub">
          Identyfikator <code style={{background:'var(--orange-dim)', padding:'2px 6px'}}>{slug || '(brak)'}</code> nie jest w bazie WWW. Sprawdź pełną listę profili.
        </div>
        <a href="wydawcy.html" className="btn-primary">← Wróć do listy wydawców</a>
      </div>
    </>
  );
}

function App() {
  const MONTHS = window.WWW_MONTHS;
  const PUBS = window.WWW_PUBLISHERS;
  const CAT_NAMES = window.WWW_CAT_NAMES;
  const CAT_COLORS = window.WWW_CAT_COLORS;

  const slug = getQuery('id');
  const p = slug ? PUBS[slug] : null;

  useEffect(() => {
    if (p) document.title = `${p.name} — Profil wydawcy | Wirtualny Wskaźnik Wpływu`;
  }, [p]);

  if (!p) return <NotFound slug={slug}/>;

  const latest = getLatest(p, MONTHS);
  const history = getHistoryEntries(p, MONTHS);
  const scores = history.map(h => h.entry.score);
  const ranks = history.map(h => h.entry.rank);
  
  const bestScore = scores.length ? Math.max(...scores) : null;
  const worstScore = scores.length ? Math.min(...scores) : null;
  const bestRank = ranks.length ? Math.min(...ranks) : null;
  const worstRank = ranks.length ? Math.max(...ranks) : null;
  const avgScore = scores.length ? (scores.reduce((a,b)=>a+b,0) / scores.length) : null;
  
  // Find neighbours by current rank
  const pubArr = Object.values(PUBS).map(x => ({...x, latest: getLatest(x, MONTHS)}))
    .filter(x => x.latest)
    .sort((a,b) => a.latest.rank - b.latest.rank);
  const myIdx = pubArr.findIndex(x => x.slug === p.slug);
  const prevPub = myIdx > 0 ? pubArr[myIdx - 1] : null;
  const nextPub = myIdx >= 0 && myIdx < pubArr.length - 1 ? pubArr[myIdx + 1] : null;

  // Wirtualnemedia.pl URL — preferuj tag URL jeśli znany, inaczej wyszukiwarka
  const searchUrl = p.tagUrl || `https://www.wirtualnemedia.pl/szukaj/${encodeURIComponent(p.name)}`;
  
  // Auto paragraph
  const paragraph = window.generatePublisherParagraph(p, MONTHS, CAT_NAMES);

  return (
    <>
      <nav className="nav-top">
        <div className="nav-brand">
          <a href="https://www.wirtualnemedia.pl" target="_blank" rel="noopener" aria-label="Wirtualnemedia.pl">
            <img className="nav-logo-wm" src="assets/logo-wirtualnemedia.png" alt="Wirtualnemedia.pl"/>
          </a>
          <div className="nav-brand-divider"/>
          <a href="index.html" aria-label="Wirtualny Wskaźnik Wpływu">
            <img className="nav-logo-www" src="assets/logo-www.png" alt="Wirtualny Wskaźnik Wpływu"/>
          </a>
        </div>
        <a className="nav-link" href="index.html">Archiwum</a>
        <a className="nav-link active" href="wydawcy.html">Profile wydawców</a>
        <a className="nav-link" href="https://www.wirtualnemedia.pl/" target="_blank" rel="noopener">Wirtualnemedia.pl ↗</a>
      </nav>

      <div className="hero">
        <div className="hero-bg-name">{p.name}</div>
        <div className="wrap">
          <div className="hero-breadcrumb">
            <a href="index.html">WWW</a>
            <span>›</span>
            <a href="wydawcy.html">Profile wydawców</a>
            <span>›</span>
            <span>{p.name}</span>
          </div>
          <div className="hero-grid">
            <div>
              <div className="hero-meta">Profil wydawcy · {latest ? `${latest.month.name} ${latest.month.year}` : 'Tylko w kategorii tematycznej'}</div>
              <h1 className="hero-title">{p.name}</h1>
              {p.holding && <div className="hero-holding">{p.holding}</div>}
              <div className="hero-cat-tags">
                {p.cats && p.cats.map(c => (
                  <span key={c} className="hero-cat-tag" style={{background: CAT_COLORS[c]+'33', color: CAT_COLORS[c]}}>{CAT_NAMES[c]}</span>
                ))}
              </div>
            </div>
            {latest && (
              <div className="hero-stat">
                <div className="hero-rank"><span className="hero-rank-prefix">#</span>{latest.rank}</div>
                <div className="hero-rank-suffix">w rankingu ogólnym</div>
                <div className="hero-score">{latest.score.toFixed(2)} <span style={{fontSize:'0.5em',color:'rgba(255,255,255,0.5)'}}>pkt</span></div>
                <div className="hero-score-lbl">Wynik WWW</div>
                <div>
                  <span className={`hero-change ${latest.change > 0 ? 'up' : latest.change < 0 ? 'dn' : 'eq'}`}>
                    {latest.change > 0 ? '↑' : latest.change < 0 ? '↓' : '–'}
                    {latest.change !== 0 ? Math.abs(latest.change) : 'bez zmian'}
                    {latest.change !== 0 ? ' pozycji m/m' : ''}
                  </span>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* KPI strip */}
      <div className="kpi-strip">
        <div className="wrap">
          <div className="kpi-grid">
            <div className="kpi">
              <div className="kpi-label">Najlepsza pozycja</div>
              <div className="kpi-val">{bestRank ? `#${bestRank}` : '—'}</div>
              <div className="kpi-sub">w okresie analizy</div>
            </div>
            <div className="kpi">
              <div className="kpi-label">Najsłabsza pozycja</div>
              <div className="kpi-val">{worstRank ? `#${worstRank}` : '—'}</div>
              <div className="kpi-sub">w okresie analizy</div>
            </div>
            <div className="kpi">
              <div className="kpi-label">Średni wynik</div>
              <div className="kpi-val">{avgScore ? <>{avgScore.toFixed(2)}<span className="small">pkt</span></> : '—'}</div>
              <div className="kpi-sub">{avgScore ? 'średnia 8 miesięcy' : 'brak w rankingu ogólnym'}</div>
            </div>
            <div className="kpi">
              <div className="kpi-label">Miesięcy w TOP</div>
              <div className="kpi-val">{history.length}<span className="small">/ {MONTHS.length}</span></div>
              <div className="kpi-sub">{history.length ? 'obecność w rankingu' : 'tylko w kategorii'}</div>
            </div>
          </div>
        </div>
      </div>

      {/* AUTO PARAGRAPH */}
      <section className="section">
        <div className="wrap">
          <h2 className="section-label">Podsumowanie</h2>
          <div className="summary-box">
            <p className="summary-text" dangerouslySetInnerHTML={{__html: paragraph}}/>
          </div>
        </div>
      </section>

      {/* HISTORY CHART */}
      <section className="section">
        <div className="wrap">
          <h2 className="section-label">Historia 8 miesięcy</h2>
          <div className="chart-wrap">
            <div className="chart-toolbar">
              <div style={{display:'flex', flexDirection:'column'}}>
                <div className="section-title" style={{margin:0, fontSize:20}}>Wynik WWW i pozycja w rankingu</div>
                <div style={{fontSize:12, color:'var(--text3)', marginTop:2}}>Wrzesień 2025 → {latest ? `${latest.month.name} ${latest.month.year}` : '—'}</div>
              </div>
              <div className="chart-legend">
                <span><span className="chart-legend-dot" style={{background:'var(--orange)'}}/>Wynik WWW</span>
                <span><span className="chart-legend-dot" style={{background:'#0D1B2A', border:'1px dashed rgba(0,0,0,0.3)'}}/>Pozycja</span>
              </div>
            </div>
            <window.HistoryChart history={history} months={MONTHS}/>
          </div>
        </div>
      </section>

      {/* CATEGORIES */}
      {p.cats && p.cats.length > 0 && (
        <section className="section">
          <div className="wrap">
            <h2 className="section-label">Pozycje w kategoriach tematycznych</h2>
            <div className="cat-grid">
              {p.cats.map(c => {
                const catH = p.catHistory[c] || {};
                const catLatestKey = MONTHS.slice().reverse().find(m => catH[m.id]);
                const catLatest = catLatestKey ? catH[catLatestKey.id] : null;
                const catEntries = MONTHS.map(m => catH[m.id]).filter(Boolean);
                const bestCatRank = catEntries.length ? Math.min(...catEntries.map(e=>e.rank)) : null;
                return (
                  <div key={c} className="cat-card">
                    <div className="cat-card-bar" style={{background: CAT_COLORS[c]}}/>
                    <div className="cat-card-top">
                      <div className="cat-card-name" style={{color: CAT_COLORS[c]}}>{CAT_NAMES[c]}</div>
                      {catLatest && <div className="cat-card-rank" style={{color: CAT_COLORS[c]}}>#{catLatest.rank}</div>}
                    </div>
                    {catLatest ? (
                      <>
                        <div className="cat-card-sub">{catLatest.score.toFixed(2)} pkt · {catLatestKey.name} {catLatestKey.year}</div>
                        <div className="cat-card-trend">
                          {bestCatRank !== null && bestCatRank !== catLatest.rank && <>Najlepsza: #{bestCatRank}</>}
                          {bestCatRank === catLatest.rank && <>Aktualnie najwyżej w historii</>}
                        </div>
                      </>
                    ) : <div className="cat-card-sub">brak danych w tym miesiącu</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      )}

      {/* RECENT ARTICLES */}
      <section className="section">
        <div className="wrap">
          <h2 className="section-label">Najnowsze teksty na Wirtualnemedia.pl</h2>
          <div className="articles-wrap">
            <div className="articles-header">
              <div className="articles-title">Co piszemy o wydawcy „{p.name}"</div>
              <a className="articles-link" href={searchUrl} target="_blank" rel="noopener">
                Wszystkie teksty <span style={{fontSize:16}}>→</span>
              </a>
            </div>

            {/* Najnowsze artykuły. Jeśli p.recentArticles istnieje (zassane z wirtualnemedia.pl tag), renderuj listę. */}
            <div id="wm-recent-articles" data-publisher={p.slug} data-publisher-name={p.name}>
              {p.recentArticles && p.recentArticles.length > 0 ? (
                <div className="articles-list">
                  {p.recentArticles.map((a, i) => (
                    <a key={i} className="article-item" href={a.url} target="_blank" rel="noopener">
                      <div className="article-item-body">
                        <div className="article-item-title">{a.title}</div>
                        {a.excerpt && <div className="article-item-excerpt">{a.excerpt}</div>}
                        <div className="article-item-meta">Wirtualnemedia.pl ↗</div>
                      </div>
                    </a>
                  ))}
                </div>
              ) : (
                <div className="articles-placeholder">
                  <div className="articles-placeholder-text">
                    Teksty o marce <strong>„{p.name}"</strong> dla tego wydawcy nie zostały jeszcze zassane.<br/>
                    Skorzystaj z linku „Wszystkie teksty →" powyżej, by przejść do wyszukiwarki Wirtualnemedia.pl.
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* NAV BETWEEN PUBS */}
      <section style={{padding:'8px 0'}}>
        <div className="wrap">
          <div className="nav-pubs">
            {prevPub ? (
              <a className="nav-pub-card" href={`wydawca.html?id=${prevPub.slug}`}>
                <div className="nav-pub-card-dir">← Wyżej w rankingu</div>
                <div className="nav-pub-card-name">{prevPub.name}</div>
                <div className="nav-pub-card-rank">#{prevPub.latest.rank} · {prevPub.latest.score.toFixed(2)} pkt</div>
              </a>
            ) : <div style={{flex:1}}/>}
            <a className="nav-pub-card" style={{flex:'0 1 auto', alignItems:'center'}} href="wydawcy.html">
              <div className="nav-pub-card-dir">↑ Wszystkie</div>
              <div className="nav-pub-card-name">Pełna lista</div>
              <div className="nav-pub-card-rank">130 wydawców</div>
            </a>
            {nextPub ? (
              <a className="nav-pub-card" href={`wydawca.html?id=${nextPub.slug}`} style={{textAlign:'right'}}>
                <div className="nav-pub-card-dir">Niżej w rankingu →</div>
                <div className="nav-pub-card-name">{nextPub.name}</div>
                <div className="nav-pub-card-rank">#{nextPub.latest.rank} · {nextPub.latest.score.toFixed(2)} pkt</div>
              </a>
            ) : <div style={{flex:1}}/>}
          </div>
        </div>
      </section>

      <footer>
        <div className="wrap">
          <div className="footer">
            <div className="footer-brand">Wirtualny Wskaźnik Wpływu · Profile wydawców</div>
            <div className="footer-src">Aktualizowane co miesiąc · Źródło: Wirtualnemedia.pl</div>
          </div>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
