  );

  const cardStyle = {
    background: '#fff', borderRadius: 8, overflow:'hidden', cursor:'pointer',
    boxShadow: hov ? T.shadow2 : T.shadow1,
    transition: 'box-shadow 0.2s, transform 0.15s',
    transform: hov ? 'translateY(-2px)' : 'none',
    border: isPremium ? `2px solid ${T.orange}` : `1px solid ${T.gray200}`,
    position: 'relative',
  };

  return (
    <div style={cardStyle} onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      {isPremium && <div style={{ background:T.orange, padding:'5px 14px', display:'flex', alignItems:'center', gap:5 }}>

      </div>}
      <div style={{ padding:'14px 16px 14px' }}>
        <div style={{ display:'flex',alignItems:'flex-start',gap:12,marginBottom:10 }}>
          <CompanyLogoPlaceholder name={company.name} size={48} bg={isPremium?'#FEF0E9':'#F4F4F5'}/>

/* ─── PAGE: KATALOG HOME ─────────────────────────────────────────── */
function KatalogHome({ onNavigate, listVariant }) {
  const [search, setSearch] = React.useState('');
  const [activeCat, setActiveCat] = React.useState('Wszystkie');

  const featured = COMPANIES.filter(c => c.featured);
  const filtered = COMPANIES.filter(c =>
    (activeCat==='Wszystkie'||c.cat===activeCat) &&
    (!search || c.name.toLowerCase().includes(search.toLowerCase()) || c.cat.toLowerCase().includes(search.toLowerCase()) || c.tags?.some(t=>t.toLowerCase().includes(search.toLowerCase())))
  );

  return (
    <main style={{ flex:1, padding:'0 0 48px' }}>
      {/* Hero banner */}
      <div style={{ background:T.navy, padding:'32px 0 28px' }}>
        <div style={{ maxWidth:1200,margin:'0 auto',padding:'0 32px' }}>
          <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:T.orange,marginBottom:8 }}>Katalog Firm</div>
          <h1 style={{ fontSize:28,fontWeight:800,color:'#fff',marginBottom:6,letterSpacing:'-0.02em' }}>Firmy z branży mediów,<br/>marketingu i reklamy</h1>
          <p style={{ fontSize:14,color:'rgba(255,255,255,0.55)',marginBottom:20,lineHeight:1.5 }}>Znajdź sprawdzonych partnerów, dostawców i kontrahentów na polskim rynku.</p>
          <SearchBar value={search} onChange={setSearch} onSearch={()=>{}}/>
          <div style={{ marginTop:12,fontSize:12,color:'rgba(255,255,255,0.35)' }}>
            Zarejestrowanych firm: <strong style={{ color:'rgba(255,255,255,0.7)' }}>{COMPANIES.length}</strong> &nbsp;·&nbsp; Wpisów wyróżnionych: <strong style={{ color:T.orange }}>{COMPANIES.filter(c=>c.premium).length}</strong>
          </div>
        </div>
      </div>

      <div style={{ maxWidth:1200,margin:'0 auto',padding:'0 32px' }}>

        {/* Variant A: Featured mixed into grid */}
        {listVariant === 'A' && (
          <>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',margin:'28px 0 12px' }}>
              <CategoryFilters active={activeCat} onChange={setActiveCat}/>
            </div>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16 }}>
              <span style={{ fontSize:13,color:T.gray500 }}>{filtered.length} firm</span>
              <button onClick={()=>onNavigate('add')} style={{ background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'8px 18px',fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer' }}>
                + Dodaj firmę
              </button>
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16 }}>
              {filtered.map(c => <CompanyCard key={c.id} company={c} onClick={()=>onNavigate('company',c)}/>)}
            </div>
          </>
        )}

        {/* Variant B: Featured section on top, then regular grid */}
        {listVariant === 'B' && (
          <>
            <div style={{ padding:'24px 0 0' }}>
              <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:14 }}>
                <span style={{ fontSize:13,fontWeight:700,color:T.orange,letterSpacing:'0.06em',textTransform:'uppercase' }}>⭐ Wyróżnieni partnerzy</span>
                <div style={{ flex:1,height:1,background:T.gray200 }}/>
              </div>
              <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:28 }}>
                {featured.map(c => <CompanyCard key={c.id} company={c} onClick={()=>onNavigate('company',c)}/>)}
              </div>
            </div>
            <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:14 }}>
              <span style={{ fontSize:13,fontWeight:700,color:T.gray600,letterSpacing:'0.06em',textTransform:'uppercase' }}>Wszystkie firmy</span>
              <div style={{ flex:1,height:1,background:T.gray200 }}/>
            </div>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16 }}>
              <CategoryFilters active={activeCat} onChange={setActiveCat}/>
              <button onClick={()=>onNavigate('add')} style={{ flexShrink:0,background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'8px 18px',fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer',marginLeft:12 }}>+ Dodaj firmę</button>
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14 }}>
              {COMPANIES.filter(c=>!c.featured&&(activeCat==='Wszystkie'||c.cat===activeCat)).map(c => <CompanyCard key={c.id} company={c} onClick={()=>onNavigate('company',c)}/>)}
            </div>
          </>
        )}

        {/* Variant C: Large featured cards at top */}
        {listVariant === 'C' && (
          <>
            <div style={{ padding:'24px 0 0' }}>
              <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:14 }}>
                <span style={{ fontSize:13,fontWeight:700,color:T.orange,letterSpacing:'0.06em',textTransform:'uppercase' }}>⭐ Wyróżnieni</span>
                <div style={{ flex:1,height:1,background:T.gray200 }}/>
              </div>
              <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:28 }}>
                {featured.slice(0,2).map(c => <FeaturedCard key={c.id} company={c} onClick={()=>onNavigate('company',c)}/>)}
              </div>
              {featured.length>2 && <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:28 }}>
                {featured.slice(2).map(c => <CompanyCard key={c.id} company={c} onClick={()=>onNavigate('company',c)}/>)}
              </div>}
            </div>
            <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:14 }}>
              <span style={{ fontSize:13,fontWeight:700,color:T.gray600,letterSpacing:'0.06em',textTransform:'uppercase' }}>Pozostałe firmy</span>
              <div style={{ flex:1,height:1,background:T.gray200 }}/>
            </div>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16 }}>
              <CategoryFilters active={activeCat} onChange={setActiveCat}/>
              <button onClick={()=>onNavigate('add')} style={{ flexShrink:0,background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'8px 18px',fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer',marginLeft:12 }}>+ Dodaj firmę</button>
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14 }}>
              {COMPANIES.filter(c=>!c.featured&&(activeCat==='Wszystkie'||c.cat===activeCat)).map(c=><CompanyCard key={c.id} company={c} onClick={()=>onNavigate('company',c)}/>)}
            </div>
          </>
        )}

        {/* Pagination */}
        <div style={{ display:'flex',justifyContent:'center',gap:6,marginTop:32 }}>
          {[1,2,3,'…',8].map((p,i) => (
            <button key={i} style={{ width:34,height:34,borderRadius:6,border:`1.5px solid ${p===1?T.orange:T.gray300}`,background:p===1?T.orange:'#fff',color:p===1?'#fff':T.gray600,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:"'DM Sans',sans-serif" }}>{p}</button>
          ))}
        </div>
      </div>
    </main>
  );
}

/* ─── PAGE: PAKIETY / CENNIK ─────────────────────────────────────── */

        <div style={{ textAlign:'center',marginBottom:36 }}>

                ))}

                  <div key={f} style={{ display:'flex',gap:8,alignItems:'flex-start',fontSize:12,color:T.gray300 }}>

                    {f}

              </div>

        <div style={{ textAlign:'center',marginTop:24,fontSize:12,color:T.gray400 }}>

        </div>
      </div>
    </main>
  );
}

/* ─── PAGE: FORMULARZ DODAWANIA ──────────────────────────────────── */
function AddCompanyForm({ onNavigate, initPkg }) {
  const [step, setStep] = React.useState(1);
  const [pkg, setPkg] = React.useState(initPkg?.id||'free');
  const [form, setForm] = React.useState({ name:'', cat:'', short:'', city:'', nip:'', phone:'', email:'', www:'' });

  function Field({ label, id, placeholder, required, locked }) {
    return (
      <div style={{ marginBottom:14 }}>
        <label style={{ display:'block',fontSize:12,fontWeight:600,color:locked?T.gray400:T.gray600,marginBottom:5 }}>
          {label}{required&&<span style={{ color:T.orange }}> *</span>}
          {locked&&<span style={{ marginLeft:6,fontSize:10,background:T.gray200,color:T.gray500,padding:'1px 6px',borderRadius:3,fontWeight:600 }}>Premium</span>}
        </label>
        <input disabled={locked} value={form[id]||''} onChange={e=>setForm(f=>({...f,[id]:e.target.value}))}
          placeholder={locked?'Dostępne w pakiecie Standard lub Premium':placeholder}
          style={{ width:'100%',padding:'9px 12px',border:`1.5px solid ${locked?T.gray200:T.gray300}`,borderRadius:6,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',color:T.gray900,background:locked?T.gray50:'#fff' }}
          onFocus={e=>{if(!locked)e.target.style.borderColor=T.orange}}
          onBlur={e=>e.target.style.borderColor=locked?T.gray200:T.gray300}
        />
      </div>
    );
  }

  const STEPS = ['Dane firmy','Opis i kategoria','Pakiet','Potwierdzenie'];
  const isPremium = pkg==='premium';
  const isStandard = pkg==='standard'||isPremium;

  return (
    <main style={{ flex:1, padding:'0 0 48px' }}>
      <div style={{ maxWidth:760,margin:'0 auto',padding:'24px 32px 0' }}>
        <Breadcrumb items={[{ label:'Katalog Firm',onClick:()=>onNavigate('katalog') },{ label:'Dodaj firmę' }]}/>

        {/* Step indicator */}
        <div style={{ display:'flex',gap:0,marginBottom:28 }}>
          {STEPS.map((s,i) => (
            <div key={i} style={{ flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6,position:'relative' }}>
              {i<STEPS.length-1 && <div style={{ position:'absolute',top:14,left:'50%',right:'-50%',height:2,background:step>i+1?T.orange:T.gray200,zIndex:0 }}/>}
              <div style={{ width:28,height:28,borderRadius:'50%',background:step>i+1?T.orange:step===i+1?T.orange:'#fff',border:`2px solid ${step>=i+1?T.orange:T.gray300}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:step>=i+1?'#fff':T.gray400,zIndex:1,position:'relative' }}>
                {step>i+1?'✓':i+1}
              </div>
              <span style={{ fontSize:11,fontWeight:600,color:step===i+1?T.orange:T.gray400,textAlign:'center' }}>{s}</span>
            </div>
          ))}
        </div>

        <div style={{ background:'#fff',borderRadius:8,padding:'28px',boxShadow:T.shadow1,border:`1px solid ${T.gray200}` }}>
          {step===1 && (
            <>
              <h2 style={{ fontSize:16,fontWeight:700,color:T.gray900,marginBottom:4 }}>Dane teleadresowe firmy</h2>
              <p style={{ fontSize:13,color:T.gray500,marginBottom:20 }}>Wypełnij dane firmy, która ma zostać dodana do katalogu.</p>
              <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px' }}>
                <div style={{ gridColumn:'1/-1' }}><Field label="Nazwa firmy" id="name" placeholder="np. Agencja Kreatywna XYZ" required/></div>
                <Field label="Miasto" id="city" placeholder="np. Warszawa" required/>
                <Field label="NIP" id="nip" placeholder="000-000-00-00" required/>
                <Field label="Telefon firmy" id="phone" placeholder="+48 000 000 000" required/>
                <Field label="E-mail firmy" id="email" placeholder="kontakt@firma.pl" required/>
                <div style={{ gridColumn:'1/-1' }}><Field label="Strona WWW" id="www" placeholder="www.firma.pl" locked={!isStandard}/></div>
              </div>
              <div style={{ borderTop:`1px solid ${T.gray200}`,marginTop:8,paddingTop:20 }}>
                <div style={{ fontSize:13,fontWeight:700,color:T.gray700,marginBottom:14 }}>Dane osoby zgłaszającej</div>
                <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px' }}>
                  <Field label="Imię i nazwisko" id="contactName" placeholder="np. Anna Kowalska" required/>
                  <Field label="E-mail kontaktowy" id="contactEmail" placeholder="anna.kowalska@firma.pl" required/>
                </div>
                <p style={{ fontSize:11,color:T.gray400,marginTop:-4,lineHeight:1.5 }}>Dane służą wyłącznie do komunikacji z redakcją w sprawie weryfikacji wpisu. Nie będą publikowane.</p>
              </div>
            </>
          )}
          {step===2 && (
            <>
              <h2 style={{ fontSize:16,fontWeight:700,color:T.gray900,marginBottom:4 }}>Opis i kategoria</h2>
              <p style={{ fontSize:13,color:T.gray500,marginBottom:20 }}>Opisz działalność firmy i prześlij logotyp.</p>

              {/* Logo upload */}
              <div style={{ marginBottom:20 }}>
                <label style={{ display:'block',fontSize:12,fontWeight:600,color:T.gray600,marginBottom:5 }}>Logotyp firmy <span style={{ fontSize:11,fontWeight:400,color:T.gray400 }}>(PNG, JPG, SVG — maks. 2 MB)</span></label>
                <div style={{ border:`2px dashed ${T.gray300}`,borderRadius:8,padding:'20px',textAlign:'center',cursor:'pointer',background:T.gray50,transition:'border-color 0.15s' }}
                  onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=T.orange}}
                  onDragLeave={e=>e.currentTarget.style.borderColor=T.gray300}
                  onClick={()=>document.getElementById('logo-upload').click()}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={T.gray400} strokeWidth="1.5" style={{ margin:'0 auto 8px',display:'block' }}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                  <div style={{ fontSize:13,fontWeight:600,color:T.gray600,marginBottom:2 }}>Kliknij lub przeciągnij plik</div>
                  <div style={{ fontSize:11,color:T.gray400 }}>Zalecany rozmiar: 400×400 px, tło transparentne</div>
                  <input id="logo-upload" type="file" accept=".png,.jpg,.jpeg,.svg" style={{ display:'none' }}
                    onChange={e=>{ const f=e.target.files[0]; if(f) setForm(fm=>({...fm,logoName:f.name})); }}/>
                </div>
                {form.logoName && <div style={{ fontSize:12,color:T.orange,fontWeight:600,marginTop:6,display:'flex',alignItems:'center',gap:6 }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>
                  {form.logoName}
                </div>}
              </div>

              <div style={{ marginBottom:14 }}>
                <label style={{ display:'block',fontSize:12,fontWeight:600,color:T.gray600,marginBottom:5 }}>Kategoria <span style={{ color:T.orange }}>*</span></label>
                <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}
                  style={{ width:'100%',padding:'9px 12px',border:`1.5px solid ${T.gray300}`,borderRadius:6,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',color:T.gray900,background:'#fff' }}>
                  <option value="">-- Wybierz kategorię --</option>
                  {CATS.slice(1).map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div style={{ marginBottom:14 }}>
                <label style={{ display:'block',fontSize:12,fontWeight:600,color:T.gray600,marginBottom:5 }}>Krótki opis <span style={{ color:T.orange }}>*</span> <span style={{ fontWeight:400,color:T.gray400 }}>(do 300 znaków)</span></label>
                <textarea rows={3} maxLength={300} value={form.short||''} onChange={e=>setForm(f=>({...f,short:e.target.value}))}
                  placeholder="Krótki opis działalności firmy..."
                  style={{ width:'100%',padding:'9px 12px',border:`1.5px solid ${T.gray300}`,borderRadius:6,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',color:T.gray900,resize:'vertical' }}/>
                <div style={{ fontSize:11,color:T.gray400,textAlign:'right',marginTop:3 }}>{(form.short||'').length}/300</div>
              </div>
              <div style={{ marginBottom:14 }}>
                <label style={{ display:'block',fontSize:12,fontWeight:600,color:isStandard?T.gray600:T.gray400,marginBottom:5 }}>
                  Rozbudowany opis
                  {!isStandard&&<span style={{ marginLeft:6,fontSize:10,background:T.gray200,color:T.gray500,padding:'1px 6px',borderRadius:3,fontWeight:600 }}>Standard+</span>}
                </label>
                <textarea rows={4} disabled={!isStandard}
                  placeholder={isStandard?'Szczegółowy opis firmy, usług, doświadczenia...':'Dostępne w pakiecie Standard lub Premium'}
                  style={{ width:'100%',padding:'9px 12px',border:`1.5px solid ${isStandard?T.gray300:T.gray200}`,borderRadius:6,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',color:T.gray900,resize:'vertical',background:isStandard?'#fff':T.gray50 }}/>
              </div>
            </>
          )}
          {step===3 && (
            <>
              <h2 style={{ fontSize:16,fontWeight:700,color:T.gray900,marginBottom:4 }}>Wybierz pakiet</h2>
              <p style={{ fontSize:13,color:T.gray500,marginBottom:20 }}>Pakiet możesz zmienić lub rozszerzyć w dowolnym momencie.</p>
              <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
                {PACKAGES.map(p => (
                  <div key={p.id} onClick={()=>setPkg(p.id)}
                    style={{ border:`2px solid ${pkg===p.id?T.orange:T.gray200}`,borderRadius:8,cursor:'pointer',background:pkg===p.id?T.orangeLight:'#fff',transition:'all 0.15s',overflow:'hidden' }}>
                    {/* Header row */}
                    <div style={{ display:'flex',alignItems:'center',gap:14,padding:'14px 18px',borderBottom:pkg===p.id?`1px solid ${T.orange}22`:`1px solid ${T.gray200}` }}>
                      <div style={{ width:20,height:20,borderRadius:'50%',border:`2px solid ${pkg===p.id?T.orange:T.gray300}`,background:pkg===p.id?T.orange:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
                        {pkg===p.id&&<div style={{ width:8,height:8,borderRadius:'50%',background:'#fff' }}/>}
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ display:'flex',alignItems:'center',gap:8 }}>
                          <span style={{ fontSize:15,fontWeight:700,color:T.gray900 }}>{p.name}</span>
                          {p.popular&&<span style={{ fontSize:10,background:T.orange,color:'#fff',padding:'2px 8px',borderRadius:9999,fontWeight:700 }}>Popularny</span>}
                        </div>
                        <div style={{ fontSize:12,color:T.gray500,marginTop:1 }}>
                          {p.price===0?'Bezpłatny':`${p.price} zł / ${p.period}`}
                        </div>
                      </div>
                      <div style={{ fontSize:12,color:pkg===p.id?T.orange:T.gray400,fontWeight:600 }}>
                        {p.features.length} funkcji
                      </div>
                    </div>
                    {/* Benefits — visible when selected */}
                    {pkg===p.id && (
                      <div style={{ padding:'14px 18px 16px 52px' }}>
                        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 20px' }}>
                          {p.features.map(f=>(
                            <div key={f} style={{ display:'flex',gap:7,alignItems:'flex-start',fontSize:12,color:T.gray700 }}>
                              <svg style={{ flexShrink:0,marginTop:1,color:T.orange }} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                              {f}
                            </div>
                          ))}
                        </div>
                        {p.locked.length>0 && (
                          <div style={{ marginTop:10,paddingTop:10,borderTop:`1px solid ${T.orange}22` }}>
                            <div style={{ fontSize:11,fontWeight:600,color:T.gray400,marginBottom:6 }}>Niedostępne w tym pakiecie:</div>
                            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 20px' }}>
                              {p.locked.map(f=>(
                                <div key={f} style={{ display:'flex',gap:7,alignItems:'flex-start',fontSize:11,color:T.gray300 }}>
                                  <svg style={{ flexShrink:0,marginTop:1 }} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                  {f}
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              {pkg!=='free' && (
                <div style={{ marginTop:20,padding:'16px',background:T.gray50,borderRadius:8,border:`1px solid ${T.gray200}` }}>
                  <div style={{ fontSize:12,fontWeight:700,color:T.gray700,marginBottom:8 }}>Dane do faktury</div>
                  <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px' }}>
                    {['Nazwa firmy / imię i nazwisko','NIP','Adres','Kod pocztowy i miasto'].map(l=>(
                      <div key={l}>
                        <label style={{ fontSize:11,fontWeight:600,color:T.gray500,display:'block',marginBottom:3 }}>{l}</label>
                        <input style={{ width:'100%',padding:'7px 10px',border:`1px solid ${T.gray300}`,borderRadius:4,fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:'none' }} placeholder="..."/>
                      </div>
                    ))}
                  </div>
                  <p style={{ fontSize:11,color:T.gray400,marginTop:10,lineHeight:1.5 }}>Po złożeniu zgłoszenia skontaktujemy się z Tobą w ciągu 1 dnia roboczego w celu wystawienia faktury i aktywacji wpisu.</p>
                </div>
              )}
            </>
          )}
          {step===4 && (
            <div style={{ textAlign:'center',padding:'20px 0' }}>
              <div style={{ width:64,height:64,borderRadius:'50%',background:'#DCFCE7',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px' }}>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22C55E" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <h2 style={{ fontSize:20,fontWeight:800,color:T.gray900,marginBottom:8 }}>Zgłoszenie wysłane!</h2>
              <p style={{ fontSize:14,color:T.gray500,lineHeight:1.6,maxWidth:400,margin:'0 auto 24px' }}>
                Twoja firma trafiła do moderacji. Redakcja Wirtualne Media zweryfikuje wpis w ciągu 1–2 dni roboczych i poinformuje Cię e-mailem o publikacji.
              </p>
              <button onClick={()=>onNavigate('katalog')} style={{ background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'10px 24px',fontSize:14,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer' }}>Wróć do katalogu</button>
            </div>
          )}

          {step < 4 && (
            <div style={{ display:'flex',justifyContent:'space-between',marginTop:24,paddingTop:20,borderTop:`1px solid ${T.gray200}` }}>
              <button onClick={()=>step>1?setStep(s=>s-1):onNavigate('katalog')}
                style={{ background:'#fff',color:T.gray600,border:`1.5px solid ${T.gray300}`,borderRadius:6,padding:'9px 20px',fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",cursor:'pointer' }}>
                {step===1?'Anuluj':'Wstecz'}
              </button>
              <button onClick={()=>setStep(s=>s+1)}
                style={{ background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'9px 24px',fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:'pointer' }}>
                {step===3?'Wyślij zgłoszenie':'Dalej →'}
              </button>
            </div>
          )}
        </div>
      </div>
    </main>
  );
}

/* ─── FOOTER ─────────────────────────────────────────────────────── */
function Footer() {
  return (
    <footer style={{ background:T.navy,marginTop:0 }}>
      <div style={{ maxWidth:1200,margin:'0 auto',padding:'28px 32px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12 }}>
        <img src="../assets/logo-dark.png" alt="Wirtualne Media" style={{ height:24,objectFit:'contain' }}/>
        <span style={{ fontSize:11,color:'rgba(255,255,255,0.3)' }}>© 2026 Wirtualne Media. Wszelkie prawa zastrzeżone.</span>
      </div>
    </footer>
  );
}

/* ─── APP ────────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "listVariant": "A" }/*EDITMODE-END*/;

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('wm_katalog')||'{}'); } catch { return {}; }})();
  const [page, setPage] = React.useState(saved.page||'katalog');
  const [pageData, setPageData] = React.useState(saved.pageData||null);
  const [tweaks, setTweaks] = React.useState({ ...TWEAK_DEFAULTS, ...saved.tweaks });

  function navigate(p, data) {
    setPage(p); setPageData(data||null);
    localStorage.setItem('wm_katalog', JSON.stringify({ page:p, pageData:data||null, tweaks }));
    window.scrollTo(0,0);
  }

  // Tweaks panel wiring
  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel')?.classList.add('visible');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel')?.classList.remove('visible');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    function renderTweaks() {
      const variantEl = document.getElementById('tweak-variant');
      const viewEl = document.getElementById('tweak-view');
      if (variantEl) {
        variantEl.innerHTML = '';
        ['A','B','C'].forEach(v => {
          const btn = document.createElement('button');
          btn.className = 'tweak-chip' + (tweaks.listVariant===v?' active':'');
          btn.textContent = v==='A'?'A — Siatka mieszana':v==='B'?'B — Wyróżnieni na górze':'C — Hero spotlight';
          btn.style.cssText = 'font-size:11px;font-weight:600;padding:4px 10px;border-radius:9999px;border:1.5px solid #E0E0E0;background:#fff;color:#555;cursor:pointer;';
          if (tweaks.listVariant===v) { btn.style.borderColor='#F05A28'; btn.style.background='#FEF0E9'; btn.style.color='#F05A28'; }
          btn.onclick = () => { setTweaks(t=>({...t,listVariant:v})); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{listVariant:v}},'*'); };
          variantEl.appendChild(btn);
        });
      }
    }
    renderTweaks();
    return () => window.removeEventListener('message', handler);
  }, [tweaks]);

  return (
    <div style={{ display:'flex',flexDirection:'column',minHeight:'100vh' }}>
      <WmNav onNavigate={navigate} currentPage={page}/>
      {page==='katalog' && <KatalogHome onNavigate={navigate} listVariant={tweaks.listVariant}/>}
      {page==='company' && <CompanyProfile company={pageData} onNavigate={navigate}/>}
      {page==='pakiety' && <PakietyPage onNavigate={navigate}/>}
      {page==='add' && <AddCompanyForm onNavigate={navigate} initPkg={pageData?.pkg}/>}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
