<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --bg: #F4F4F5; --surface: #ffffff; --surface2: #F9F9FA;
  --nav: #0D1B2A; --border: #E0E0E0; --border-strong: #CBD0D8;
  --orange: #F05A28; --orange-hover: #C94316; --orange-dim: rgba(240,90,40,0.10); --orange-dim2: rgba(240,90,40,0.06);
  --text: #111111; --text2: #555555; --text3: #8A9AAB;
  --green: #16A34A; --green-dim: rgba(22,163,74,0.12);
  --red: #DC2626; --red-dim: rgba(220,38,38,0.10);
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; line-height: 1.55; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button, input { font-family: inherit; }

/* NAV */
.nav-top { background: var(--nav); height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 14px; position: sticky; top: 0; z-index: 100; }
.nav-brand { display: flex; align-items: center; gap: 14px; margin-right: auto; }
.nav-brand-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.18); }
.nav-logo-wm { height: 22px; display: block; transition: opacity 0.15s; }
.nav-logo-www { height: 26px; display: block; transition: opacity 0.15s; }
.nav-brand a:hover .nav-logo-wm, .nav-brand a:hover .nav-logo-www { opacity: 0.78; }
.nav-link { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); padding: 8px 12px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
.nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-link.active { color: var(--orange); }

/* HERO */
.hero { background: var(--nav); color: #fff; padding: 56px 0 44px; position: relative; overflow: hidden; }
.hero::after { content: 'WYDAWCY'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%); font-family: 'Barlow Condensed', sans-serif; font-size: 180px; font-weight: 800; color: rgba(240,90,40,0.04); pointer-events: none; letter-spacing: -6px; line-height: 1; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
.wrap-narrow { max-width: 860px; }
.hero-badge { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange); margin-bottom: 12px; }
.hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(40px, 6vw, 64px); font-weight: 800; line-height: 0.95; letter-spacing: -1px; margin-bottom: 14px; }
.hero-title span { color: var(--orange); }
.hero-sub { font-size: 15px; color: rgba(255,255,255,0.55); max-width: 600px; line-height: 1.6; margin-bottom: 0; }
.hero-breadcrumb { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
.hero-breadcrumb a { color: rgba(255,255,255,0.7); }
.hero-breadcrumb a:hover { color: var(--orange); }

/* CONTROLS */
.controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 0; position: sticky; top: 52px; z-index: 50; }
.controls-inner { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 220px; max-width: 380px; position: relative; }
.search-box input { width: 100%; height: 40px; padding: 0 14px 0 38px; border: 1.5px solid var(--border); background: var(--surface); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
.search-box input:focus { border-color: var(--orange); }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.cat-filter { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-pill { padding: 7px 14px; font-size: 12px; font-weight: 600; color: var(--text2); background: var(--surface); border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
.cat-pill:hover { color: var(--text); border-color: var(--border-strong); }
.cat-pill.active { color: #fff; background: var(--orange); border-color: var(--orange); }
.count-info { font-size: 12px; color: var(--text3); font-weight: 600; letter-spacing: 0.04em; margin-left: auto; }

/* LIST */
.section { padding: 32px 0 80px; }
.pub-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
.pub-card { background: var(--surface); padding: 18px 20px; display: flex; flex-direction: column; gap: 8px; transition: background 0.15s, transform 0.15s; cursor: pointer; position: relative; min-height: 130px; }
.pub-card:hover { background: var(--surface2); }
.pub-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.pub-rank { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: var(--orange); line-height: 1; min-width: 38px; }
.pub-rank.unranked { color: var(--text3); font-size: 14px; padding-top: 4px; letter-spacing: 0.05em; }
.pub-score-block { text-align: right; }
.pub-score { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
.pub-score-label { font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
.pub-name { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
.pub-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 11px; color: var(--text3); margin-top: auto; padding-top: 8px; }
.pub-holding { font-size: 11px; color: var(--text2); font-weight: 500; }
.pub-cats { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
.cat-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.cat-tag { font-size: 10px; padding: 2px 6px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border-radius: 2px; }
.change-up { color: var(--green); font-weight: 700; }
.change-dn { color: var(--red); font-weight: 700; }
.change-eq { color: var(--text3); }
.pub-change { font-size: 11px; font-weight: 700; }
.sparkline-mini { width: 60px; height: 18px; }
.empty { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 12px; color: var(--border-strong); }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-label::before { content: ''; width: 20px; height: 2px; background: var(--orange); display: inline-block; flex-shrink: 0; }

/* Sort tabs */
.sort-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.sort-tab { padding: 10px 18px; font-size: 12px; font-weight: 600; color: var(--text2); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
.sort-tab:hover { color: var(--text); }
.sort-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

/* FOOTER */
.footer { padding: 32px 0 48px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.footer-brand { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
.footer-src { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }

@media (max-width: 700px) {
  .nav-top { padding: 0 14px; }
  .wrap { padding: 0 14px; }
  .pub-list { grid-template-columns: 1fr; }
  .controls-inner { gap: 12px; }
  .cat-filter { width: 100%; overflow-x: auto; flex-wrap: nowrap; }
  .cat-pill { white-space: nowrap; }
  .count-info { margin-left: 0; width: 100%; }
  .hero { padding: 40px 0 32px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="data-publishers.js"></script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

function LogoMark() {
  return (
    <svg width="32" height="22" viewBox="0 0 58 38" fill="none">
      <polygon points="0,2 8,2 13,36 5,36" fill="#F05A28"/>
      <polygon points="10,36 18,36 28,3 20,3" fill="#F05A28"/>
      <polygon points="30,3 38,3 43,36 35,36" fill="#F05A28"/>
      <polygon points="40,36 48,36 58,2 50,2" fill="#F05A28"/>
    </svg>
  );
}

function Sparkline({ history, months }) {
  const points = months.map(m => history[m.id]).filter(Boolean);
  if (points.length < 2) return <div className="sparkline-mini"/>;
  const scores = points.map(p => p.score);
  const min = Math.min(...scores), max = Math.max(...scores);
  const range = max - min || 1;
  const W = 60, H = 18;
  const xs = points.map((_, i) => (i / (points.length - 1)) * W);
  const ys = points.map(p => H - ((p.score - min) / range) * H);
  const d = xs.map((x, i) => `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(' ');
  const last = points[points.length-1];
  const prev = points[points.length-2];
  const trend = last.score >= prev.score ? '#16A34A' : '#DC2626';
  return (
    <svg className="sparkline-mini" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <path d={d} stroke={trend} strokeWidth="1.5" fill="none" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="1.8" fill={trend}/>
    </svg>
  );
}

function getLatest(p, months) {
  for (let i = months.length - 1; i >= 0; i--) {
    if (p.history[months[i].id]) return { ...p.history[months[i].id], monthId: months[i].id };
  }
  return null;
}

function App() {
  const MONTHS = window.WWW_MONTHS;
  const PUBS = window.WWW_PUBLISHERS;
  const CAT_NAMES = window.WWW_CAT_NAMES;
  const CAT_COLORS = window.WWW_CAT_COLORS;
  
  const [query, setQuery] = useState('');
  const [catFilter, setCatFilter] = useState('all');
  const [sortBy, setSortBy] = useState('rank'); // rank, name, change

  const pubArr = useMemo(() => Object.values(PUBS), [PUBS]);

  const filtered = useMemo(() => {
    let arr = pubArr.map(p => {
      const latest = getLatest(p, MONTHS);
      return { ...p, latest };
    });
    if (query) {
      const q = query.toLowerCase().trim();
      arr = arr.filter(p => 
        p.name.toLowerCase().includes(q) || 
        (p.holding || '').toLowerCase().includes(q)
      );
    }
    if (catFilter !== 'all') {
      arr = arr.filter(p => p.cats && p.cats.includes(catFilter));
    }
    if (sortBy === 'rank') {
      arr.sort((a,b) => {
        const sa = a.latest?.score ?? -1;
        const sb = b.latest?.score ?? -1;
        return sb - sa;
      });
    } else if (sortBy === 'name') {
      arr.sort((a,b) => a.name.localeCompare(b.name, 'pl'));
    } else if (sortBy === 'change') {
      arr.sort((a,b) => {
        // Most positive change first (best mover up)
        const ca = a.latest?.change ?? 0;
        const cb = b.latest?.change ?? 0;
        return cb - ca;
      });
    }
    return arr;
  }, [pubArr, query, catFilter, sortBy]);

  return (
    <>
      <nav className="nav-top">
        <div className="nav-brand">
          <a href="https://www.wirtualnemedia.pl" target="_blank" rel="noopener" aria-label="Wirtualnemedia.pl">
            <img className="nav-logo-wm" src="assets/logo-wirtualnemedia.png" alt="Wirtualnemedia.pl"/>
          </a>
          <div className="nav-brand-divider"/>
          <a href="index.html" aria-label="Wirtualny Wskaźnik Wpływu">
            <img className="nav-logo-www" src="assets/logo-www.png" alt="Wirtualny Wskaźnik Wpływu"/>
          </a>
        </div>
        <a className="nav-link" href="index.html">Archiwum</a>
        <a className="nav-link active" href="wydawcy.html">Profile wydawców</a>
        <a className="nav-link" href="https://www.wirtualnemedia.pl/" target="_blank" rel="noopener">Wirtualnemedia.pl ↗</a>
      </nav>

      {/* HERO */}
      <div className="hero">
        <div className="wrap">
          <div className="hero-breadcrumb">
            <a href="index.html">WWW</a>
            <span>›</span>
            <span>Profile wydawców</span>
          </div>
          <div className="hero-badge">Pełna baza · {pubArr.length} marek medialnych</div>
          <h1 className="hero-title">Profile <span>wydawców</span></h1>
          <p className="hero-sub">
            Każdy z analizowanych w rankingu WWW wydawców ma indywidualny profil — z aktualnym wynikiem, historią ośmiu miesięcy, pozycjami w kategoriach i najnowszymi tekstami z Wirtualnemedia.pl.
          </p>
        </div>
      </div>

      {/* CONTROLS */}
      <div className="controls">
        <div className="wrap">
          <div className="controls-inner">
            <div className="search-box">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input 
                type="text"
                placeholder="Szukaj wydawcy lub holdingu…"
                value={query}
                onChange={e => setQuery(e.target.value)}
              />
            </div>
            <div className="cat-filter">
              <button className={`cat-pill ${catFilter === 'all' ? 'active' : ''}`} onClick={() => setCatFilter('all')}>Wszystkie</button>
              {Object.entries(CAT_NAMES).map(([k, label]) => (
                <button 
                  key={k}
                  className={`cat-pill ${catFilter === k ? 'active' : ''}`}
                  onClick={() => setCatFilter(k)}
                  style={catFilter === k ? {background: CAT_COLORS[k], borderColor: CAT_COLORS[k]} : {}}
                >{label}</button>
              ))}
            </div>
            <div className="count-info">{filtered.length} {filtered.length === 1 ? 'wydawca' : (filtered.length < 5 ? 'wydawców' : 'wydawców')}</div>
          </div>
        </div>
      </div>

      <section className="section">
        <div className="wrap">
          <div className="sort-tabs">
            <div className={`sort-tab ${sortBy === 'rank' ? 'active' : ''}`} onClick={() => setSortBy('rank')}>Wg pozycji WWW</div>
            <div className={`sort-tab ${sortBy === 'name' ? 'active' : ''}`} onClick={() => setSortBy('name')}>Alfabetycznie</div>
            <div className={`sort-tab ${sortBy === 'change' ? 'active' : ''}`} onClick={() => setSortBy('change')}>Wg zmiany m/m</div>
          </div>
          
          {filtered.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">∅</div>
              <div>Brak wyników dla podanych kryteriów</div>
            </div>
          ) : (
            <div className="pub-list">
              {filtered.map(p => (
                <a key={p.slug} className="pub-card" href={`wydawca.html?id=${p.slug}`}>
                  <div className="pub-card-top">
                    {p.latest ? (
                      <div className="pub-rank">#{p.latest.rank}</div>
                    ) : (
                      <div className="pub-rank unranked">poza TOP</div>
                    )}
                    <div style={{display:'flex', gap:10, alignItems:'flex-start'}}>
                      <Sparkline history={p.history} months={MONTHS}/>
                      <div className="pub-score-block">
                        <div className="pub-score">{p.latest ? p.latest.score.toFixed(2) : '—'}</div>
                        <div className="pub-score-label">WWW</div>
                      </div>
                    </div>
                  </div>
                  <div className="pub-name">{p.name}</div>
                  {p.holding && <div className="pub-holding">{p.holding}</div>}
                  <div className="pub-meta">
                    {p.cats && p.cats.length > 0 && (
                      <div className="pub-cats">
                        {p.cats.map(c => (
                          <span key={c} className="cat-tag" style={{background:CAT_COLORS[c]+'22', color:CAT_COLORS[c]}}>{CAT_NAMES[c]}</span>
                        ))}
                      </div>
                    )}
                    {p.latest && p.latest.change !== 0 && (
                      <span className={`pub-change ${p.latest.change > 0 ? 'change-up' : 'change-dn'}`} style={{marginLeft:'auto'}}>
                        {p.latest.change > 0 ? `↑${p.latest.change}` : `↓${Math.abs(p.latest.change)}`}
                      </span>
                    )}
                  </div>
                </a>
              ))}
            </div>
          )}
        </div>
      </section>

      <footer>
        <div className="wrap">
          <div className="footer">
            <div className="footer-brand">Wirtualny Wskaźnik Wpływu · Profile wydawców</div>
            <div className="footer-src">Aktualizowane co miesiąc · Źródło: Wirtualnemedia.pl</div>
          </div>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
